<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EchoPoly IDE – Editor</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/editor.css" />

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

  <!-- html2canvas for screenshots -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- Monaco loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBCcyLy_rNx-riDjmK4SUu-gZbKtDPqEYQ",
      authDomain: "echopoly-ide.firebaseapp.com",
      databaseURL: "https://echopoly-ide-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "echopoly-ide",
      storageBucket: "echopoly-ide.appspot.com",
      messagingSenderId: "290647098484",
      appId: "1:290647098484:web:61a9a5503c43d465bdbd21",
      measurementId: "G-LYBESX64E5"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    const auth = firebase.auth();
    const googleProvider = new firebase.auth.GoogleAuthProvider();

    // Track current authenticated user and active project
    let currentUser = null;
    let userId = null;
    let currentProjectId = null;
    // Presence helpers (single shared set for cleanup)
    window._presenceInterval = null;
    window._presenceBlur = null;
    window._presenceFocus = null;

    // SINGLE unified auth state handler - handles everything
    auth.onAuthStateChanged(user => {
      currentUser = user;
      userId = user ? user.uid : null;
      const profileDiv = document.getElementById("user-profile");

      function cleanupPresence() {
        try { if (window._presenceInterval) { clearInterval(window._presenceInterval); window._presenceInterval = null; } } catch(e){}
        try { if (window._presenceBlur) window.removeEventListener('blur', window._presenceBlur); } catch(e){}
        try { if (window._presenceFocus) window.removeEventListener('focus', window._presenceFocus); } catch(e){}
      }

      if (user) {
        console.log('User authenticated, userId:', userId);
        
        const userPhoto = user.photoURL || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%237c3aed%22%3E%3Ccircle cx=%2212%22 cy=%2212%22 r=%2710%22/%3E%3C/svg%3E';
        const userName = user.displayName || (user.email || '').split("@")[0];

        profileDiv.innerHTML = `<img src="${userPhoto}" style="width:24px;height:24px;border-radius:50%;margin-right:6px;"><span>${userName}</span>`;

        // Global presence
        const globalRef = db.ref("activeUsers/" + user.uid);
        globalRef.set({
          name: userName,
          photo: userPhoto,
          email: user.email,
          lastActive: Date.now(),
          status: 'active'
        });
        globalRef.onDisconnect().remove();

        // Presence heartbeat
        cleanupPresence();
        window._presenceInterval = setInterval(() => {
          try { globalRef.update({ lastActive: Date.now() }); } catch(e) {}
        }, 60000);

        // Blur/Focus handlers
        window._presenceBlur = () => { try { globalRef.update({ status: 'inactive' }); } catch(e){} };
        window._presenceFocus = () => { try { globalRef.update({ status: 'active', lastActive: Date.now() }); } catch(e){} };
        window.addEventListener('blur', window._presenceBlur);
        window.addEventListener('focus', window._presenceFocus);

        // Show editor
        document.getElementById("login-popup").classList.add("hidden");

        // Initialize Monaco FIRST with proper timing and error handling
        // Do this before loading projects to avoid DOM interference
        setTimeout(() => {
          try {
            console.log('=== Initializing Monaco ===');
            const editorContainer = document.getElementById('monaco-editor');
            console.log('Container element:', editorContainer);
            
            if (!editorContainer) {
              console.error('Monaco container not found!');
              return;
            }
            
            // Ensure container has dimensions
            const rect = editorContainer.getBoundingClientRect();
            console.log('Container dimensions:', { width: rect.width, height: rect.height });
            console.log('Container offsetWidth/offsetHeight:', editorContainer.offsetWidth, editorContainer.offsetHeight);
            
            // Force dimensions if needed
            if (editorContainer.offsetWidth === 0 || editorContainer.offsetHeight === 0) {
              console.warn('Container has no dimensions, forcing...');
              editorContainer.style.width = '100%';
              editorContainer.style.height = '100%';
              editorContainer.style.display = 'block';
            }
            
            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs' }});
            
            require(['vs/editor/editor.main'], function() {
              console.log('Monaco main loaded');
              
              if (!window.editor) {
                try {
                  console.log('Creating Monaco editor...');
                  window.editor = monaco.editor.create(editorContainer, {
                    value: '',
                    language: 'javascript',
                    theme: 'vs-dark',
                    automaticLayout: true,
                    fontSize: 16,
                    minimap: { enabled: false }
                  });
                  
                  console.log('Monaco editor created:', window.editor);
                  
                  // Trigger layout
                  window.editor.layout();
                  
                } catch(err) {
                  console.error('Failed to create editor:', err);
                }

                if (window.editor) {
                  window.editor.onDidChangeModelContent(() => {
                    isSaved = false;
                    try { scheduleSave(); } catch (e) { }
                  });

                  if (!currentProjectId) {
                    const lang = 'javascript';
                    monaco.editor.setModelLanguage(window.editor.getModel(), languageMap[lang] || 'plaintext');
                    window.editor.setValue(starterCode[lang] || '');
                    updateTabDisplay('Untitled', lang);
                  }
                }
              }
            });
          } catch(err) {
            console.error('Monaco initialization error:', err);
          }
          
          // NOW load projects after Monaco is initialized
          console.log('Loading project list...');
          loadProjectList();
          
          // Load project from URL if present
          if (projectId) {
            console.log('Loading project from URL:', projectId);
            loadProject(projectId);
          }
        }, 500);

        // Global active users listener
        db.ref("activeUsers").on("value", snapshot => {
          renderActiveUsers(snapshot);
        });

        // Teacher dashboard
        db.ref("activeUsers").on("value", snapshot => {
          const activeList = document.getElementById('active-list');
          const inactiveList = document.getElementById('inactive-list');
          const activeCountEl = document.getElementById('active-count');
          const inactiveCountEl = document.getElementById('inactive-count');
          if (!activeList || !inactiveList) return;
          activeList.innerHTML = '';
          inactiveList.innerHTML = '';

          if (!snapshot.exists()) {
            if (activeCountEl) activeCountEl.textContent = '0';
            if (inactiveCountEl) inactiveCountEl.textContent = '0';
            return;
          }

          let activeCount = 0;
          let inactiveCount = 0;

          snapshot.forEach(child => {
            const userData = child.val();
            const div = document.createElement('div');
            div.style.padding = '6px 8px';
            div.style.display = 'flex';
            div.style.alignItems = 'center';
            div.style.marginBottom = '3px';
            div.style.borderRadius = '4px';
            div.style.fontSize = '12px';

            const img = document.createElement('img');
            img.src = userData.photo || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%237c3aed%22%3E%3Ccircle cx=%2212%22 cy=%2212%22 r=%2710%22/%3E%3C/svg%3E';
            img.style.width = '20px';
            img.style.height = '20px';
            img.style.borderRadius = '50%';
            img.style.marginRight = '6px';

            const dot = document.createElement('span');
            dot.style.width = '8px';
            dot.style.height = '8px';
            dot.style.borderRadius = '50%';
            dot.style.marginRight = '6px';
            dot.style.display = 'inline-block';
            dot.style.backgroundColor = userData.status === 'active' ? '#4ec9b0' : '#7f8083';

            const span = document.createElement('span');
            span.textContent = userData.name || userData.email || 'User';
            if (auth.currentUser && userData.email === auth.currentUser.email) span.textContent += ' (You)';

            div.appendChild(img);
            div.appendChild(dot);
            div.appendChild(span);

            if (userData.status === 'active') {
              activeList.appendChild(div);
              activeCount += 1;
            } else {
              inactiveList.appendChild(div);
              inactiveCount += 1;
            }
          });

          if (activeCountEl) activeCountEl.textContent = activeCount;
          if (inactiveCountEl) inactiveCountEl.textContent = inactiveCount;
        });

      } else {
        console.log('User signed out');
        document.getElementById("login-popup").classList.remove("hidden");
        document.getElementById("editor").style.display = "none";
        profileDiv.innerHTML = "";
        cleanupPresence();
      }
    });

    // Starter code map
    const starterCode = {
      html: `<!DOCTYPE html>
<html>
<head>
  <title>New Project</title>
</head>
<body>
  <h1>Hello World</h1>
</body>
</html>`,
      css: `body {
  font-family: Arial, sans-serif;
  background: #fff;
  color: #111;
}`,
      javascript: `console.log("Hello, World!");`,
      python: `print("Hello, World!")`,
      java: `public class Main {
  public static void main(String[] args) {
    System.out.println("Hello, World");
  }
}`,
      cpp: `#include <iostream>
using namespace std;

int main() {
  cout << "Hello, World" << endl;
  return 0;
}`,
      typescript: `let message: string = "Hello, World!";
console.log(message);`
    };

    // Language map for Monaco
    const languageMap = {
      html: "html",
      css: "css",
      javascript: "javascript",
      python: "python",
      java: "java",
      cpp: "cpp",
      typescript: "typescript",
      json: "json",
      markdown: "markdown",
      xml: "xml",
      sql: "sql",
      shell: "shell"
    };

    // Get projectId from URL
    const urlParams = new URLSearchParams(window.location.search);
    const projectId = urlParams.get("project");

    let isSaved = true;
    // Track whether a project-scoped activeUsers node currently has data
    let projectActiveUsersHasData = false;

    // Theme sync: apply data-theme based on saved preference or system default
    function applyTheme(mode) {
      if (mode === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      else if (mode === 'light') document.documentElement.setAttribute('data-theme', 'light');
      else {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
      }
    }

    // Delete a project for the current user
    function deleteProject(projectId) {
      if (!userId) { showToast('Please sign in to delete projects.'); return; }
      if (!projectId) return;
      if (!confirm('Are you sure you want to delete this project?')) return;
      db.ref('projects/' + userId + '/' + projectId).remove()
        .then(() => {
          showToast('Project deleted');
          if (currentProjectId === projectId) {
            if (window.editor) window.editor.setValue('// Project deleted. Start a new one.');
            currentProjectId = null;
          }
        }).catch(err => {
          console.error('Delete failed', err);
          showToast('Failed to delete project');
        });
    }
    // initialize theme from localStorage or system
    (function() {
      const saved = localStorage.getItem('theme-mode') || 'system';
      applyTheme(saved);
      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
          if ((localStorage.getItem('theme-mode') || 'system') === 'system') applyTheme('system');
        });
      }
    })();

    // Toast helper
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      toast.classList.remove("hidden");
      setTimeout(() => {
        toast.classList.remove("show");
        toast.classList.add("hidden");
      }, 3000);
    }

    // Render active users into the sidebar; accepts a Firebase snapshot
    function renderActiveUsers(snapshot) {
      console.log('renderActiveUsers called, snapshot exists:', snapshot && snapshot.exists());
      const activeUsersDiv = document.getElementById("active-users");
      if (!activeUsersDiv) {
        console.error('active-users element not found');
        return;
      }

      activeUsersDiv.innerHTML = "";

      if (!snapshot || !snapshot.exists()) {
        console.log('No active users data in Firebase');
        activeUsersDiv.textContent = "No active users. Login to join!";
        return;
      }
      console.log('Active users found:', snapshot.numChildren());

      snapshot.forEach(child => {
        const userData = child.val();
        const row = document.createElement("div");
        row.style.display = "flex";
        row.style.alignItems = "center";
        row.style.marginBottom = "6px";

        // User photo
        const img = document.createElement("img");
        img.src = userData.photo || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%237c3aed%22%3E%3Ccircle cx=%2212%22 cy=%2212%22 r=%2710%22/%3E%3C/svg%3E';
        img.style.width = "24px";
        img.style.height = "24px";
        img.style.borderRadius = "50%";
        img.style.marginRight = "6px";
        img.onerror = () => { img.style.display = "none"; };

        // Online indicator dot
        const dot = document.createElement("span");
        dot.style.width = "10px";
        dot.style.height = "10px";
        dot.style.borderRadius = "50%";
        dot.style.backgroundColor = "limegreen";
        dot.style.marginRight = "6px";
        dot.style.display = "inline-block";

        // Username
        const span = document.createElement("span");
        span.textContent = userData.name || userData.email || 'Guest';

        if (auth.currentUser && userData.email === auth.currentUser.email) {
          span.textContent += " (You)";
        }

        row.appendChild(img);
        row.appendChild(dot);
        row.appendChild(span);
        activeUsersDiv.appendChild(row);
      });
    }

    // Format last active timestamp into a human readable string
    function formatLastActive(ts) {
      if (!ts) return '';
      const diff = Math.floor((Date.now() - ts) / 1000);
      if (diff < 60) return 'Last active: just now';
      if (diff < 3600) return `Last active: ${Math.floor(diff / 60)} min ago`;
      if (diff < 86400) return `Last active: ${Math.floor(diff / 3600)} hr ago`;
      return 'Last active: ' + new Date(ts).toLocaleString();
    }

    // Save project content + screenshot (per-user project)
    function saveEditorContent() {
      // Backwards-compatible alias
      return saveProject();
    }

    function captureEditorScreenshot(projectId) {
      const editorContainer = document.getElementById("monaco-editor");
      if (!editorContainer) return;

      html2canvas(editorContainer).then(canvas => {
        const screenshotData = canvas.toDataURL("image/png");
        const pathId = currentProjectId || projectId || 'unknown';
        const uidPath = userId || 'public';
        const storageRef = storage.ref("screenshots/" + uidPath + "/" + pathId + ".png");
        storageRef.putString(screenshotData, 'data_url').then(snapshot => {
          snapshot.ref.getDownloadURL().then(url => {
            const dbPath = userId && pathId !== 'unknown' ? ("projects/" + userId + "/" + pathId) : ("projects/" + pathId);
            db.ref(dbPath).update({ screenshot: url });
          }).catch(()=>{});
        }).catch(()=>{});
      }).catch(()=>{});
    }

    // Debounced auto-save: schedule saves after typing stops
    let __saveTimeout = null;
    function scheduleSave() {
      if (__saveTimeout) clearTimeout(__saveTimeout);
      __saveTimeout = setTimeout(() => {
        if (!isSaved) saveEditorContent();
      }, 1000);
    }

    // Get file extension based on language
    function getFileExtension(lang) {
      const extensions = {
        javascript: '.js',
        typescript: '.ts',
        python: '.py',
        java: '.java',
        cpp: '.cpp',
        css: '.css',
        html: '.html',
        json: '.json',
        markdown: '.md',
        xml: '.xml',
        sql: '.sql',
        shell: '.sh'
      };
      return extensions[lang] || '.txt';
    }

    // Update tab display with project name and extension
    function updateTabDisplay(projectName, language) {
      const tabName = document.getElementById('tab-name');
      const currentTab = document.getElementById('current-tab');
      if (tabName && currentTab) {
        const ext = getFileExtension(language || 'javascript');
        const displayName = (projectName || 'Untitled') + ext;
        tabName.textContent = displayName;
        currentTab.style.display = 'flex';
      }
    }

    // Create a new project under the signed-in user's namespace
    function createProject(name, language, code) {
      if (!userId) { showToast('Please sign in to create projects.'); return; }
      const title = name || prompt('Enter project name') || 'Untitled Project';
      const newKey = db.ref().child('projects').push().key;
      const payload = {
        name: title,
        language: language || 'javascript',
        code: code || starterCode['javascript'] || '// Start coding...'
      };
      db.ref('projects/' + userId + '/' + newKey).set(payload).then(() => {
        showToast('Project created: ' + title);
        currentProjectId = newKey;
        loadProject(newKey);
      }).catch(err => {
        console.error('Create project failed', err);
        showToast('Failed to create project');
      });
    }

    // Load a project for the current user
    function loadProject(pid) {
      if (!userId) {
        // Not signed in yet — store the id and wait for auth to load
        currentProjectId = pid;
        return;
      }
      currentProjectId = pid;
      const dbPath = 'projects/' + userId + '/' + pid;
      console.log('=== Loading Project ===');
      console.log('userId:', userId);
      console.log('projectId:', pid);
      console.log('Full path:', dbPath);
      
      const ref = db.ref(dbPath);
      ref.once('value').then(snapshot => {
        console.log('Snapshot exists:', snapshot.exists());
        console.log('Snapshot val:', snapshot.val());
        
        const project = snapshot.val();
        if (!project) {
          console.log('Project is null/undefined');
          showToast('Project not found');
          return;
        }
        
        console.log('Project loaded:', project);
        const projectTitleEl = document.getElementById('project-title');
        if (projectTitleEl) projectTitleEl.textContent = project.name || project.title || 'Untitled Project';
        const code = project.code || '';
        const lang = project.language || 'javascript';
        
        // Create projectFiles array with the loaded code
        const extension = extensionMap[lang] || 'txt';
        const fileName = 'index.' + extension;
        const fileId = fileName + '-' + pid;
        
        projectFiles = [{
          id: fileId,
          name: fileName,
          language: lang,
          content: code,
          isOpen: true
        }];
        currentFileId = fileId;
        
        // Wait for editor to be ready before setting value
        if (window.editor) {
          console.log('Editor exists, setting code');
          monaco.editor.setModelLanguage(window.editor.getModel(), languageMap[lang] || 'plaintext');
          window.editor.setValue(code);
        } else {
          console.log('Editor not ready yet, waiting...');
          setTimeout(() => {
            if (window.editor) {
              console.log('Editor ready after delay, setting code');
              monaco.editor.setModelLanguage(window.editor.getModel(), languageMap[lang] || 'plaintext');
              window.editor.setValue(code);
            }
          }, 500);
        }
        
        // Update tab display with project name and language
        updateTabDisplay(fileName, lang);
        updateSidebarFiles();
        
        // update URL to reflect current project
        const url = new URL(window.location);
        url.searchParams.set('project', pid);
        window.history.replaceState({}, '', url);
      }).catch(err => {
        console.error('Load project failed:', err, 'Path was:', dbPath);
        showToast('Failed to load project');
      });
    }

    // Save current project for the signed-in user
    function saveProject() {
      if (!userId || !currentProjectId) {
        showToast('No project selected to save');
        return Promise.resolve();
      }
      const code = window.editor ? window.editor.getValue() : '';
      isSaved = true;
      return db.ref('projects/' + userId + '/' + currentProjectId + '/code').set(code).then(() => {
        captureEditorScreenshot(currentProjectId);
        showToast('Saved');
      }).catch(err => {
        console.error('Save failed', err);
        showToast('Save failed');
      });
    }

    // Populate the project list UI for the signed-in user and listen for changes
    function loadProjectList() {
      if (!userId) {
        console.log('loadProjectList: userId not set yet');
        return;
      }
      console.log('loadProjectList called for userId:', userId);
      const listDiv = document.getElementById('project-list');
      if (!listDiv) {
        console.error('project-list element not found');
        return;
      }
      listDiv.innerHTML = '<div style="padding:8px;color:#9aa0c7;">Loading...</div>';
      const ref = db.ref('projects/' + userId);
      console.log('Listening to projects at: projects/' + userId);
      ref.on('value', snapshot => {
        console.log('Projects snapshot received, exists:', snapshot.exists(), 'count:', snapshot.numChildren());
        listDiv.innerHTML = '';
        if (!snapshot.exists()) {
          console.log('No projects exist for this user');
          listDiv.innerHTML = '<div style="padding:8px;color:#9aa0c7;">No projects yet</div>';
          return;
        }
        console.log('Building project list with', snapshot.numChildren(), 'projects');
        snapshot.forEach(child => {
          const p = child.val();
          const projectId = child.key;

          const container = document.createElement('div');
          container.style.display = 'flex';
          container.style.justifyContent = 'space-between';
          container.style.alignItems = 'center';
          container.style.marginBottom = '6px';
          container.style.padding = '6px 8px';
          container.style.borderRadius = '4px';
          container.style.background = currentProjectId === projectId ? 'rgba(0, 122, 204, 0.15)' : 'transparent';
          container.style.cursor = 'pointer';

          const btn = document.createElement('button');
          btn.textContent = p.name || 'Untitled';
          btn.style.flex = '1';
          btn.style.textAlign = 'left';
          btn.style.padding = '0';
          btn.style.border = 'none';
          btn.style.background = 'transparent';
          btn.style.color = '#cccccc';
          btn.style.fontSize = '13px';
          btn.style.cursor = 'pointer';
          btn.style.fontFamily = 'inherit';
          btn.onclick = () => loadProject(projectId);

          const delBtn = document.createElement('button');
          delBtn.textContent = '✕';
          delBtn.style.marginLeft = '8px';
          delBtn.style.padding = '4px 8px';
          delBtn.style.border = 'none';
          delBtn.style.background = 'transparent';
          delBtn.style.color = '#f48771';
          delBtn.style.cursor = 'pointer';
          delBtn.style.fontSize = '14px';
          delBtn.style.fontFamily = 'inherit';
          delBtn.onclick = (e) => { e.stopPropagation(); deleteProject(projectId); };

          container.appendChild(btn);
          container.appendChild(delBtn);
          listDiv.appendChild(container);
        });
      });
    }
  </script>
</head>
<body>
  <!-- VS Code Style Layout -->
  <div id="app-container">
    <!-- Top Header Bar -->
    <header id="app-header">
      <div id="header-left">
        <h1>EchoPoly IDE</h1>
        <span id="project-title">Loading Project...</span>
      </div>
      <div id="header-actions">
        <button id="save-btn">💾 Save</button>
        <button id="share-btn">🔗 Share</button>
        <button id="settings-btn">⚙️</button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content">
      <!-- Activity Bar -->
      <div id="activity-bar">
        <button id="explorer-btn" title="Explorer" class="activity-icon active">📁</button>
        <button id="search-btn" title="Search" class="activity-icon">🔍</button>
        <button id="users-btn" title="Users" class="activity-icon">👥</button>
        <button id="dashboard-btn" title="Dashboard" class="activity-icon">📊</button>
        <div style="flex:1;"></div>
        <button id="settings-bottom-btn" title="Settings" class="activity-icon">⚙️</button>
      </div>

      <!-- Sidebar -->
      <aside id="sidebar">
        <!-- Explorer Panel -->
        <div id="explorer-panel" class="sidebar-panel active">
          <div class="sidebar-header">Explorer</div>
          <button id="new-project-btn" class="btn-new">+ New Project</button>
          <div id="project-list" class="sidebar-content"></div>

        <!-- Active Users Panel -->
        <div id="users-panel" class="sidebar-panel">
          <div class="sidebar-header">Active Users</div>
          <div id="active-users" class="sidebar-content"></div>
        </div>

        <!-- Dashboard Panel -->
        <div id="dashboard-panel" class="sidebar-panel">
          <div class="sidebar-header">Classroom Dashboard</div>
          <div class="sidebar-content">
            <div id="teacher-dashboard">
              <div id="summary">Active: <span id="active-count">0</span> | Inactive: <span id="inactive-count">0</span></div>
              <div class="dashboard-section">
                <div class="dashboard-section-title">Active Students</div>
                <div id="active-list"></div>
              </div>
              <div class="dashboard-section">
                <div class="dashboard-section-title">Inactive Students</div>
                <div id="inactive-list"></div>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Editor Area -->
      <div id="editor-area">
        <div id="tab-bar">
          <div id="current-tab" style="display:none;"><span id="tab-name">Untitled</span><button id="tab-close-btn" style="margin-left:8px;background:none;border:none;color:#858585;cursor:pointer;font-size:14px;padding:0 4px;">✕</button></div>
        </div>
        <div id="editor">
          <div id="monaco-editor"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- User Profile Badge -->
  <div id="user-profile"></div>

  <!-- Login Modal -->
  <div id="login-popup" class="modal hidden">
    <div class="modal-content">
      <h2>Login to EchoPoly</h2>
      <div style="margin-bottom:1.5rem;">
        <input type="email" id="login-email" placeholder="Email" class="modal-input">
        <input type="password" id="login-password" placeholder="Password" class="modal-input">
        <label style="display:flex;align-items:center;gap:8px;margin:10px 0;font-size:0.9rem;">
          <input type="checkbox" id="remember-me"> Remember me
        </label>
        <button id="login-submit" class="modal-button">Login</button>
      </div>
      <div style="margin:1rem 0;border-bottom:1px solid #3e3e42;padding-bottom:1rem;">
        <p style="margin:0.5rem 0;font-size:0.9rem;">or</p>
      </div>
      <button id="popup-login-btn" class="modal-button">Login with Google</button>
      <p style="margin:1rem 0 0 0;font-size:0.9rem;">Don't have an account? <a href="register.html" style="color:#0e639c;text-decoration:none;">Register here</a></p>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="hidden"></div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:2000;">
    <div class="modal-content" style="width:480px;">
      <h3>Settings</h3>
      
      <label>
        <input type="checkbox" id="dark-mode-toggle"> Dark Mode
      </label>
      
      <label>
        <input type="checkbox" id="autosave-toggle" checked> Autosave
      </label>
      
      <label>
        Font Size:
        <select id="font-size-select">
          <option value="12">12px</option>
          <option value="14">14px</option>
          <option value="16" selected>16px</option>
          <option value="18">18px</option>
          <option value="20">20px</option>
        </select>
      </label>
      
      <label>
        Language:
        <select id="language-select">
          <option value="javascript">JavaScript</option>
          <option value="python">Python</option>
          <option value="java">Java</option>
          <option value="cpp">C++</option>
          <option value="typescript">TypeScript</option>
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="json">JSON</option>
          <option value="markdown">Markdown</option>
          <option value="xml">XML</option>
          <option value="sql">SQL</option>
          <option value="shell">Shell</option>
        </select>
      </label>
      
      <button id="confirm-btn">Confirm</button>
      <button id="go-back-btn">Go Back</button>
      <button id="logout-btn">Logout</button>
      <button id="close-settings">Close</button>
    </div>
  </div>

  <!-- New Project Modal -->
  <div id="new-project-modal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:2000;">
    <div class="modal-content" style="width:400px;">
      <h3 style="margin-top:0;color:#ffffff;font-size:18px;">Create New Project</h3>
      
      <div style="margin-bottom:16px;">
        <label style="display:block;color:#cccccc;font-size:13px;margin-bottom:6px;">Project Name:</label>
        <input type="text" id="new-project-name" placeholder="Enter project name (e.g., MyApp)" style="width:100%;padding:8px;background:#1e1e1e;color:#ffffff;border:1px solid #3e3e42;border-radius:4px;box-sizing:border-box;font-size:13px;">
      </div>
      
      <div style="margin-bottom:16px;">
        <label style="display:block;color:#cccccc;font-size:13px;margin-bottom:6px;">Language:</label>
        <select id="new-project-language" style="width:100%;padding:8px;background:#1e1e1e;color:#ffffff;border:1px solid #3e3e42;border-radius:4px;font-size:13px;">
          <option value="javascript">JavaScript</option>
          <option value="python">Python</option>
          <option value="html">HTML</option>
          <option value="css">CSS</option>
          <option value="java">Java</option>
          <option value="cpp">C++</option>
          <option value="typescript">TypeScript</option>
          <option value="json">JSON</option>
        </select>
      </div>
      
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="cancel-new-project" style="padding:8px 16px;background:#3e3e42;color:#cccccc;border:1px solid #555;border-radius:4px;cursor:pointer;">Cancel</button>
        <button id="create-new-project" style="padding:8px 16px;background:#0e639c;color:#ffffff;border:1px solid #0e639c;border-radius:4px;cursor:pointer;">Create</button>
      </div>
    </div>
  </div>

  <script>
    // Language to file extension mapping
    const extensionMap = {
      'javascript': 'js',
      'python': 'py',
      'html': 'html',
      'css': 'css',
      'java': 'java',
      'cpp': 'cpp',
      'typescript': 'ts',
      'json': 'json'
    };

    // Starter code for different languages
    const starterCodeForLanguage = {
      'javascript': 'console.log("Hello, World!");',
      'python': 'print("Hello, World!")',
      'html': '<!DOCTYPE html>\n<html>\n<head>\n  <title>Page</title>\n</head>\n<body>\n  <h1>Hello</h1>\n</body>\n</html>',
      'css': 'body {\n  margin: 0;\n  padding: 0;\n}',
      'java': 'public class Main {\n  public static void main(String[] args) {\n    System.out.println("Hello, World!");\n  }\n}',
      'cpp': '#include <iostream>\nusing namespace std;\nint main() {\n  cout << "Hello, World!" << endl;\n  return 0;\n}',
      'typescript': 'const message: string = "Hello, World!";\nconsole.log(message);',
      'json': '{\n  "key": "value"\n}'
    };
  </script>

  <script>
    // Project management with files/tabs
    let projectFiles = []; // Array of file objects with isOpen property
    let currentFileId = null;

    function showNewProjectModal() {
      document.getElementById('new-project-modal').classList.remove('hidden');
      document.getElementById('new-project-name').focus();
      const timestamp = Date.now();
      document.getElementById('new-project-name').value = 'Project-' + timestamp;
    }

    function hideNewProjectModal() {
      document.getElementById('new-project-modal').classList.add('hidden');
    }

    function renameFile(fileId, newName) {
      const file = projectFiles.find(f => f.id === fileId);
      if (!file) return;
      
      const oldName = file.name;
      file.name = newName;
      
      // Update tab display if this is the current file
      if (fileId === currentFileId) {
        updateTabDisplay(newName, file.language);
      }
      
      // Update sidebar
      updateSidebarFiles();
      showToast('Renamed: ' + oldName + ' → ' + newName);
    }

    function deleteFile(fileId) {
      const file = projectFiles.find(f => f.id === fileId);
      if (!file) return;
      
      const fileName = file.name;
      projectFiles = projectFiles.filter(f => f.id !== fileId);
      
      // If deleted file was active, switch to another one
      if (currentFileId === fileId) {
        const openFiles = projectFiles.filter(f => f.isOpen !== false);
        if (openFiles.length > 0) {
          currentFileId = openFiles[0].id;
          switchFile(currentFileId);
        } else if (projectFiles.length > 0) {
          currentFileId = projectFiles[0].id;
          switchFile(currentFileId);
        }
      }
      
      updateSidebarFiles();
      showToast('Deleted: ' + fileName);
    }

    function switchFile(fileId) {
      const file = projectFiles.find(f => f.id === fileId);
      if (!file || !window.editor) return;
      
      // If file was closed, open it again
      if (file.isOpen === false) {
        file.isOpen = true;
      }
      
      currentFileId = fileId;
      
      // Update editor
      const monacoLang = languageMap[file.language] || 'plaintext';
      monaco.editor.setModelLanguage(window.editor.getModel(), monacoLang);
      window.editor.setValue(file.content);
      
      // Update tab display
      updateTabDisplay(file.name, file.language);
      updateSidebarFiles();
      showToast('Switched to: ' + file.name);
    }

    function closeFile(fileId) {
      const file = projectFiles.find(f => f.id === fileId);
      if (!file) return;
      
      file.isOpen = false;
      
      // Switch to another open file if closing current
      if (currentFileId === fileId) {
        const openFiles = projectFiles.filter(f => f.isOpen !== false && f.id !== fileId);
        if (openFiles.length > 0) {
          currentFileId = openFiles[0].id;
          switchFile(currentFileId);
        }
      }
      
      updateSidebarFiles();
      showToast('Closed: ' + file.name);
    }

    function updateSidebarFiles() {
      const projectList = document.getElementById('project-list');
      if (!projectList) return;
      projectList.innerHTML = '';
      
      // Group files by language/extension
      const groups = {};
      projectFiles.forEach(file => {
        const ext = (file.name.split('.').pop() || 'other').toLowerCase();
        if (!groups[ext]) groups[ext] = [];
        groups[ext].push(file);
      });
      
      // Render groups
      const preferred = ['js','html','css','ts','py','java','cpp','json','other'];
      const keys = Object.keys(groups).sort((a,b) => {
        const ai = preferred.indexOf(a) === -1 ? preferred.length : preferred.indexOf(a);
        const bi = preferred.indexOf(b) === -1 ? preferred.length : preferred.indexOf(b);
        return ai - bi || a.localeCompare(b);
      });
      
      keys.forEach(k => {
        const groupName = k.toUpperCase();
        const folder = document.createElement('div');
        folder.style.marginBottom = '8px';
        
        const header = document.createElement('div');
        header.textContent = groupName;
        header.style.fontSize = '12px';
        header.style.color = '#9aa0c7';
        header.style.margin = '6px 0';
        folder.appendChild(header);
        
        const ul = document.createElement('div');
        ul.style.display = 'flex';
        ul.style.flexDirection = 'column';
        ul.style.gap = '4px';
        
        groups[k].forEach(file => {
          const row = document.createElement('div');
          row.style.display = 'flex';
          row.style.alignItems = 'center';
          row.style.justifyContent = 'space-between';
          row.style.padding = '6px 8px';
          row.style.borderRadius = '4px';
          row.style.cursor = 'pointer';
          row.style.color = currentFileId === file.id ? '#ffffff' : '#cccccc';
          row.style.background = currentFileId === file.id ? '#0e639c' : 'transparent';
          row.style.fontSize = '13px';
          
          const nameSpan = document.createElement('span');
          nameSpan.textContent = file.name;
          nameSpan.style.flex = '1';
          row.appendChild(nameSpan);
          
          // 3 dots menu
          const menuBtn = document.createElement('button');
          menuBtn.textContent = '⋯';
          menuBtn.style.background = 'none';
          menuBtn.style.border = 'none';
          menuBtn.style.color = currentFileId === file.id ? '#ffffff' : '#cccccc';
          menuBtn.style.cursor = 'pointer';
          menuBtn.style.fontSize = '16px';
          menuBtn.style.padding = '0 4px';
          menuBtn.style.opacity = '0.6';
          menuBtn.style.transition = 'opacity 0.2s';
          
          menuBtn.addEventListener('mouseenter', () => menuBtn.style.opacity = '1');
          menuBtn.addEventListener('mouseleave', () => menuBtn.style.opacity = '0.6');
          
          // Dropdown menu
          const dropdown = document.createElement('div');
          dropdown.style.position = 'absolute';
          dropdown.style.background = '#3e3e42';
          dropdown.style.border = '1px solid #555';
          dropdown.style.borderRadius = '4px';
          dropdown.style.minWidth = '120px';
          dropdown.style.display = 'none';
          dropdown.style.zIndex = '1000';
          dropdown.style.boxShadow = '0 2px 8px rgba(0,0,0,0.3)';
          
          const renameBtn = document.createElement('div');
          renameBtn.textContent = '✏️ Rename';
          renameBtn.style.padding = '8px 12px';
          renameBtn.style.cursor = 'pointer';
          renameBtn.style.color = '#cccccc';
          renameBtn.style.fontSize = '12px';
          renameBtn.style.userSelect = 'none';
          renameBtn.addEventListener('mouseenter', () => renameBtn.style.background = '#555');
          renameBtn.addEventListener('mouseleave', () => renameBtn.style.background = 'transparent');
          renameBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const newName = prompt('Enter new filename:', file.name);
            if (newName && newName.trim()) {
              renameFile(file.id, newName.trim());
            }
            dropdown.style.display = 'none';
          });
          dropdown.appendChild(renameBtn);
          
          // Add separator
          const separator = document.createElement('div');
          separator.style.height = '1px';
          separator.style.background = '#555';
          separator.style.margin = '4px 0';
          dropdown.appendChild(separator);
          
          // Delete button
          const deleteBtn = document.createElement('div');
          deleteBtn.textContent = '🗑️ Delete';
          deleteBtn.style.padding = '8px 12px';
          deleteBtn.style.cursor = 'pointer';
          deleteBtn.style.color = '#ff6b6b';
          deleteBtn.style.fontSize = '12px';
          deleteBtn.style.userSelect = 'none';
          deleteBtn.addEventListener('mouseenter', () => deleteBtn.style.background = '#555');
          deleteBtn.addEventListener('mouseleave', () => deleteBtn.style.background = 'transparent');
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm('Are you sure you want to delete ' + file.name + '? This cannot be undone.')) {
              deleteFile(file.id);
            }
            dropdown.style.display = 'none';
          });
          dropdown.appendChild(deleteBtn);
          
          menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
            const rect = menuBtn.getBoundingClientRect();
            dropdown.style.top = (rect.bottom + 5) + 'px';
            dropdown.style.left = (rect.left - 100) + 'px';
          });
          
          row.appendChild(menuBtn);
          row.appendChild(dropdown);
          
          row.addEventListener('click', () => {
            switchFile(file.id);
          });
          
          ul.appendChild(row);
        });
        
        folder.appendChild(ul);
        projectList.appendChild(folder);
      });
    }

    // Initialize UI
    document.addEventListener("DOMContentLoaded", () => {
      // Activity bar toggle functionality
      document.getElementById("explorer-btn").addEventListener("click", () => {
        switchPanel("explorer");
      });
      document.getElementById("search-btn").addEventListener("click", () => {
        switchPanel("search");
      });
      document.getElementById("users-btn").addEventListener("click", () => {
        switchPanel("users");
      });
      document.getElementById("dashboard-btn").addEventListener("click", () => {
        switchPanel("dashboard");
      });

      function switchPanel(panelName) {
        // Hide all panels
        document.querySelectorAll(".sidebar-panel").forEach(p => p.classList.remove("active"));
        document.querySelectorAll(".activity-icon").forEach(b => b.classList.remove("active"));

        // Show selected panel
        const mapping = { explorer: "explorer-panel", users: "users-panel", dashboard: "dashboard-panel", search: "search-panel" };
        const panelId = mapping[panelName];
        if (panelId) {
          const panel = document.getElementById(panelId);
          if (panel) panel.classList.add("active");
        }

        // Highlight activity bar button
        const buttonId = panelName + "-btn";
        const btn = document.getElementById(buttonId);
        if (btn) btn.classList.add("active");
      }

      // Settings modal
      document.getElementById("settings-btn").addEventListener("click", () => {
        document.getElementById("settings-modal").classList.remove("hidden");
      });
      document.getElementById("close-settings").addEventListener("click", () => {
        document.getElementById("settings-modal").classList.add("hidden");
      });

      // Dark Mode toggle
      document.getElementById("dark-mode-toggle").addEventListener("change", (e) => {
        if (e.target.checked) {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('theme-mode', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
          localStorage.setItem('theme-mode', 'light');
        }
      });

      // Font size selector
      document.getElementById("font-size-select").addEventListener("change", (e) => {
        const fontSize = parseInt(e.target.value);
        if (window.editor) {
          window.editor.updateOptions({ fontSize: fontSize });
        }
      });

      // Language selector
      document.getElementById("language-select").addEventListener("change", (e) => {
        const newLang = e.target.value;
        if (window.editor && monaco) {
          monaco.editor.setModelLanguage(window.editor.getModel(), languageMap[newLang] || newLang || 'plaintext');
          showToast('Language: ' + newLang);
        }
      });

      // Buttons
      document.getElementById("confirm-btn").addEventListener("click", () => {
        showToast("Settings confirmed!");
        document.getElementById("settings-modal").classList.add("hidden");
      });

      document.getElementById("go-back-btn").addEventListener("click", () => {
        document.getElementById("settings-modal").classList.add("hidden");
        showToast("Returned to editor.");
      });

      document.getElementById("logout-btn").addEventListener("click", () => {
        const uid = auth.currentUser?.uid;
        if (uid && window._presenceInterval) {
          clearInterval(window._presenceInterval);
          window._presenceInterval = null;
        }
        auth.signOut().then(() => {
          showToast("Logged out successfully");
          setTimeout(() => {
            window.location.href = "login.html";
          }, 500);
        }).catch(err => {
          console.error("Logout error:", err);
          showToast("Failed to logout");
        });
      });

      document.getElementById("save-btn").addEventListener("click", saveEditorContent);
      document.getElementById("share-btn").addEventListener("click", () => {
        const shareLink = window.location.href;
        navigator.clipboard.writeText(shareLink).then(() => {
          showToast("Share link copied to clipboard!");
        }).catch(() => {
          showToast("Failed to copy link");
        });
      });
      document.getElementById("new-project-btn").addEventListener("click", () => showNewProjectModal());

      // New project modal event listeners
      document.getElementById("create-new-project").addEventListener("click", () => {
        const projectName = document.getElementById('new-project-name').value.trim();
        const language = document.getElementById('new-project-language').value;
        
        if (!projectName) {
          showToast('Please enter a project name');
          return;
        }
        
        // Create first file for the project
        const extension = extensionMap[language] || 'txt';
        const fileName = 'index.' + extension;
        const fileId = fileName + '-' + Date.now();
        
        const newFile = {
          id: fileId,
          name: fileName,
          language: language,
          content: starterCodeForLanguage[language] || '',
          isOpen: true
        };
        
        projectFiles = [newFile];
        currentFileId = fileId;
        
        // Create the project in Firebase
        createProject(projectName, language, newFile.content);
        
        hideNewProjectModal();
        updateSidebarFiles();
      });

      document.getElementById("cancel-new-project").addEventListener("click", () => {
        hideNewProjectModal();
      });

      // Allow Enter key to create project
      document.getElementById('new-project-name').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          document.getElementById('create-new-project').click();
        }
      });

      // Tab close button - just closes the tab from view but keeps file in project
      document.getElementById("tab-close-btn").addEventListener("click", () => {
        if (currentFileId) {
          closeFile(currentFileId);
        }
      });

      // Google login
      function handleGoogleLogin() {
        auth.signInWithPopup(googleProvider).then(result => {
          const user = result.user;
          db.ref("users/" + user.uid).set({
            firstName: user.displayName.split(" ")[0],
            photoURL: user.photoURL,
            email: user.email
          });
          document.getElementById("login-popup").classList.add("hidden");
          showToast("Logged in as " + user.displayName);
        }).catch(err => {
          console.error("Login error:", err);
          showToast("Login failed: " + err.message);
        });
      }

      document.getElementById("popup-login-btn").addEventListener("click", handleGoogleLogin);

      // Email/Password login
      document.getElementById("login-submit").addEventListener("click", () => {
        const email = document.getElementById("login-email").value.trim();
        const password = document.getElementById("login-password").value;
        const remember = document.getElementById("remember-me").checked;

        if (!email || !password) {
          showToast("Please enter email and password");
          return;
        }

        const persistence = remember ? firebase.auth.Auth.Persistence.LOCAL 
                                     : firebase.auth.Auth.Persistence.SESSION;

        auth.setPersistence(persistence).then(() => {
          return auth.signInWithEmailAndPassword(email, password);
        }).then(userCredential => {
          const user = userCredential.user;
          document.getElementById("login-email").value = "";
          document.getElementById("login-password").value = "";
          document.getElementById("remember-me").checked = false;
          document.getElementById("login-popup").classList.add("hidden");
          showToast("Welcome, " + (user.displayName || user.email));
        }).catch(error => {
          console.error("Login error:", error);
          showToast("Login failed: " + error.message);
        });
      });
    });
    
    // Handle window resize for Monaco
    window.addEventListener('resize', () => {
      if (window.editor) {
        try {
          window.editor.layout();
        } catch(e) {
          console.error('Error during editor layout:', e);
        }
      }
    });
  </script>
</body>
