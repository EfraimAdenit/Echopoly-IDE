        const note = document.createElement('div');
        note.textContent = user.isLocal ? 'Tab focus tracking enabled for anti-cheat' : 'Session activity monitored';
        note.style.color = '#8a8fbc';
        note.style.fontSize = '11px';
        note.style.marginTop = '10px';
        card.appendChild(note);

        cardsContainer.appendChild(card);
      });

      dashboardContainer.appendChild(cardsContainer);
    }

    function getLocalUser() {
      return activeUsersData.find(user => user.isLocal) || activeUsersData[0];
    }

    function tickUserTimers() {
      activeUsersData.forEach(user => {
        if (user.online) {
          user.activeSeconds = (user.activeSeconds || 0) + 1;
        }
      });
      renderActiveUsers();
      renderDashboardMetrics();
    }

    let sidebarCollapsed = false;
    let lastSidebarWidth = 260;
    let previewPanelWidth = 400;

    function setupUserActivityTracking() {
      document.addEventListener('visibilitychange', () => {
        updateLocalUserVisibility(document.visibilityState === 'visible');
      });

      window.addEventListener('blur', () => {
        updateLocalUserVisibility(false);
      });

      window.addEventListener('focus', () => {
        updateLocalUserVisibility(true);
      });

      setInterval(() => {
        if (document.visibilityState === 'visible') {
          tickUserTimers();
        }
      }, 1000);

      updateLocalUserVisibility(document.visibilityState === 'visible');
    }

    function setSidebarWidth(width) {
      const sidebar = document.getElementById('sidebar');
      if (!sidebar) return;
      width = Math.max(80, Math.min(420, width));
      sidebar.style.width = width + 'px';
      lastSidebarWidth = width;
      if (sidebarCollapsed && width > 80) {
        sidebarCollapsed = false;
        sidebar.classList.remove('collapsed');
      }
    }

    function toggleSidebarCollapse() {
      const sidebar = document.getElementById('sidebar');
      if (!sidebar) return;
      sidebarCollapsed = !sidebarCollapsed;
      if (sidebarCollapsed) {
        sidebar.classList.add('collapsed');
        sidebar.style.width = '60px';
      } else {
        sidebar.classList.remove('collapsed');
        sidebar.style.width = (lastSidebarWidth || 260) + 'px';
      }
    }

    function setupSidebarResizer() {
      const resizer = document.getElementById('sidebar-resizer');
      const sidebar = document.getElementById('sidebar');
      if (!resizer || !sidebar) return;
      let isResizing = false;
      let startX = 0;
      let startWidth = 0;

      resizer.addEventListener('mousedown', (event) => {
        isResizing = true;
        startX = event.clientX;
        startWidth = sidebar.offsetWidth;
        document.body.style.cursor = 'ew-resize';
        event.preventDefault();
      });

      document.addEventListener('mousemove', (event) => {
        if (!isResizing) return;
        const diff = event.clientX - startX;
        setSidebarWidth(startWidth + diff);
      });

      document.addEventListener('mouseup', () => {
        if (!isResizing) return;
        isResizing = false;
        document.body.style.cursor = '';
      });
    }

    function setPreviewPanelVisible(show) {
      const previewPanel = document.getElementById('preview-panel');
      const previewResizer = document.getElementById('preview-resizer');
      if (!previewPanel) return;
      if (show) {
        previewPanel.style.display = 'block';
        previewPanel.style.width = previewPanelWidth + 'px';
        if (previewResizer) previewResizer.style.display = 'block';
      } else {
        previewPanel.style.display = 'none';
        if (previewResizer) previewResizer.style.display = 'none';
      }
    }

    function setupPreviewResizer() {
      const previewResizer = document.getElementById('preview-resizer');
      const previewPanel = document.getElementById('preview-panel');
      if (!previewResizer || !previewPanel) return;
      let isResizing = false;
      let startX = 0;
      let startWidth = 0;

      previewResizer.addEventListener('mousedown', (event) => {
        isResizing = true;
        startX = event.clientX;
        startWidth = previewPanel.offsetWidth;
        document.body.style.cursor = 'ew-resize';
        event.preventDefault();
      });

      document.addEventListener('mousemove', (event) => {
        if (!isResizing) return;
        const diff = startX - event.clientX;
        previewPanelWidth = Math.max(220, Math.min(650, startWidth + diff));
        previewPanel.style.width = previewPanelWidth + 'px';
      });

      document.addEventListener('mouseup', () => {
        if (!isResizing) return;
        isResizing = false;
        document.body.style.cursor = '';
      });
    }

    function switchPanel(panelName) {
      Object.values(panels).forEach(p => {
        if (p) {
          p.classList.remove('active');
          p.classList.add('hidden');
        }
      });
      if (panels[panelName]) {
        panels[panelName].classList.remove('hidden');
        panels[panelName].classList.add('active');
      }
      setActivePanelButton(panelName);
      if (panelName === 'users') {
        ensureCurrentUserInActiveUsers();
        renderActiveUsers();
      }
      if (panelName === 'dashboard') {
        ensureCurrentUserInActiveUsers();
        renderDashboardMetrics();
      }
    }

    function setupEventListeners() {
      const explorerBtn = document.getElementById('explorer-btn');
      if (explorerBtn) explorerBtn.addEventListener('click', () => switchPanel('explorer'));
      const usersBtn = document.getElementById('users-btn');
      if (usersBtn) usersBtn.addEventListener('click', () => switchPanel('users'));
      const dashboardBtn = document.getElementById('dashboard-btn');
      if (dashboardBtn) dashboardBtn.addEventListener('click', () => switchPanel('dashboard'));
      const quizBtn = document.getElementById('quiz-btn');
      if (quizBtn) quizBtn.addEventListener('click', () => switchPanel('quiz'));
      const outputBtn = document.getElementById('output-btn');
      if (outputBtn) outputBtn.addEventListener('click', () => switchPanel('output'));
      const settingsBtnSidebar = document.getElementById('settings-btn-sidebar');
      if (settingsBtnSidebar) settingsBtnSidebar.addEventListener('click', () => switchPanel('settings'));

      const newFileBtn = document.getElementById('new-file-btn');
      if (newFileBtn) newFileBtn.addEventListener('click', () => {
        showNewFileModal();
      });

      const createNewFileBtn = document.getElementById('create-new-file');
      if (createNewFileBtn) createNewFileBtn.addEventListener('click', () => {
        const newFileName = document.getElementById('new-file-name');
        const filename = newFileName ? newFileName.value.trim() : '';
        const newFileLanguage = document.getElementById('new-file-language');
        const language = newFileLanguage ? newFileLanguage.value : 'javascript';

        if (!filename) {
          showToast('Please enter a filename');
          return;
        }

        createNewFile(filename, language);
        hideNewFileModal();
      });

      const cancelNewFileBtn = document.getElementById('cancel-new-file');
      if (cancelNewFileBtn) cancelNewFileBtn.addEventListener('click', () => {
        hideNewFileModal();
      });

      const newFileNameInput = document.getElementById('new-file-name');
      if (newFileNameInput) newFileNameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          const createBtn = document.getElementById('create-new-file');
          if (createBtn) createBtn.click();
        }
      });

      const saveBtn = document.getElementById('save-btn');
      if (saveBtn) saveBtn.addEventListener('click', saveProject);

      const shareBtn = document.getElementById('share-btn');
      if (shareBtn) shareBtn.addEventListener('click', () => {
        if (!currentProjectId) {
          showToast('No project to share');
          return;
        }

        const shareLink = window.location.href.split('?')[0] + '?project=' + encodeURIComponent(currentProjectId) + '&collab=true';
        navigator.clipboard.writeText(shareLink).then(() => {
          showToast('Collaborative share link copied!');
        }).catch(() => {
          showToast('Failed to copy link');
        });
      });

      const settingsBtn = document.getElementById('settings-btn');
      if (settingsBtn) settingsBtn.addEventListener('click', () => {
        const modal = document.getElementById('settings-modal');
        if (modal) modal.classList.remove('hidden');
      });

      const closeSettingsBtn = document.getElementById('close-settings');
      if (closeSettingsBtn) closeSettingsBtn.addEventListener('click', () => {
        const modal = document.getElementById('settings-modal');
        if (modal) modal.classList.add('hidden');
      });

      const previewBtn = document.getElementById('preview-btn');
      if (previewBtn) previewBtn.addEventListener('click', togglePreview);

      const runCodeBtn = document.getElementById('run-code-btn');
      if (runCodeBtn) runCodeBtn.addEventListener('click', runCode);

      const runCodeHeaderBtn = document.getElementById('run-code-header-btn');
      if (runCodeHeaderBtn) runCodeHeaderBtn.addEventListener('click', runCode);

      const clearOutputBtn = document.getElementById('clear-output-btn');
      if (clearOutputBtn) clearOutputBtn.addEventListener('click', clearOutput);

      const chatToggleBtn = document.getElementById('chat-floating-button');
      if (chatToggleBtn) chatToggleBtn.addEventListener('click', () => {
        toggleChatWindow();
      });

      const chatCloseBtn = document.getElementById('chat-close-btn');
      if (chatCloseBtn) chatCloseBtn.addEventListener('click', () => {
        const chatWindow = document.getElementById('chat-window');
        if (chatWindow) chatWindow.classList.add('hidden');
      });

      const chatSendBtn = document.getElementById('chat-send-btn');
      if (chatSendBtn) chatSendBtn.addEventListener('click', (e) => {
        e.preventDefault();
        sendChatMessage();
      });

      const chatEmojiBtn = document.getElementById('chat-emoji-btn');
      if (chatEmojiBtn) chatEmojiBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleEmojiPicker();
      });

      const chatSnippetBtn = document.getElementById('chat-snippet-btn');
      if (chatSnippetBtn) chatSnippetBtn.addEventListener('click', promptChatSnippet);

      const chatInput = document.getElementById('chat-input');
      if (chatInput) {
        chatInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === 'ArrowRight') {
            if (e.key === 'ArrowRight') {
              const cursorAtEnd = chatInput.selectionStart === chatInput.value.length && chatInput.selectionEnd === chatInput.value.length;
              if (!cursorAtEnd) return;
            }
            e.preventDefault();
            sendChatMessage();
          }
        });

        chatInput.addEventListener('keyup', (e) => {
          if (e.key === 'ArrowRight') {
            const cursorAtEnd = chatInput.selectionStart === chatInput.value.length && chatInput.selectionEnd === chatInput.value.length;
            if (cursorAtEnd && chatInput.value.trim()) {
              sendChatMessage();
            }
          }
        });
      }

      document.addEventListener('click', (e) => {
        const emojiPicker = document.getElementById('emoji-picker');
        if (!emojiPicker) return;
        const chatEmojiBtn = document.getElementById('chat-emoji-btn');
        if (emojiPicker.contains(e.target) || chatEmojiBtn === e.target) return;
        hideEmojiPicker();
      });
    }

    // Preview functionality
    function togglePreview() {
      previewEnabled = !previewEnabled;
      setPreviewPanelVisible(previewEnabled);
      
      if (previewEnabled) {
        updatePreview();
        showToast('Preview enabled');
      } else {
        showToast('Preview disabled');
      }
      
      // Resize Monaco editor
      if (editorInstance) {
        setTimeout(() => editorInstance.layout(), 100);
      }
    }

    function updatePreview() {
      if (!previewEnabled) return;
      
      const iframe = document.getElementById('preview-iframe');
      const currentTab = openTabs.find(tab => tab.id === currentTabId);
      
      if (!currentTab) return;
      
      const content = editorInstance ? (currentTab.content || '') : getEditorContent();
      if (!editorInstance) currentTab.content = content;
      const language = currentTab.language || 'javascript';
      
      if (language === 'html') {
        if (iframe) iframe.srcdoc = content;
      } else if (language === 'javascript') {
        const html = '<html><body><script>' + content.replace(new RegExp('<' + '/script>', 'gi'), '<\\/script>') + '<' + '/script></body></html>';
        if (iframe) iframe.srcdoc = html;
      } else if (language === 'css') {
        // Create CSS preview
        const cssHtml = '<html><head><style>' + content + '</style></head><body><h1>CSS Preview</h1><div>Styles applied above</div></body></html>';
        if (iframe) iframe.srcdoc = cssHtml;
      } else {
        const escaped = content.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        if (iframe) iframe.srcdoc = '<html><body><pre>' + escaped + '</pre></body></html>';
      }
    }

    // Quiz functionality
    let currentQuiz = null;
    let quizQuestions = [
      {
        question: "What does 'var' declare in JavaScript?",
        options: ["A variable", "A constant", "A function", "A class"],
        correct: 0
      },
      {
        question: "Which method adds an element to the end of an array?",
        options: ["push()", "pop()", "shift()", "unshift()"],
        correct: 0
      },
      {
        question: "What is the correct way to write a comment in Python?",
        options: ["// comment", "# comment", "/* comment */", "<!-- comment -->"],
        correct: 1
      },
      {
        question: "Which HTML tag is used for the largest heading?",
        options: ["&lt;h6&gt;", "&lt;h1&gt;", "&lt;p&gt;", "&lt;div&gt;"],
        correct: 1
      },
      {
        question: "What does CSS stand for?",
        options: ["Computer Style Sheets", "Cascading Style Sheets", "Creative Style Sheets", "Colorful Style Sheets"],
        correct: 1
      }
    ];

    const startQuizBtn = document.getElementById('start-quiz-btn');
    if (startQuizBtn) startQuizBtn.addEventListener('click', () => {
      if (currentQuiz) {
        showToast('Quiz already active');
        return;
      }
      startQuiz();
    });

    const submitAnswerBtn = document.getElementById('submit-answer-btn');
    if (submitAnswerBtn) submitAnswerBtn.addEventListener('click', () => {
      submitAnswer();
    });

    const closeQuizBtn = document.getElementById('close-quiz-btn');
    if (closeQuizBtn) closeQuizBtn.addEventListener('click', () => {
      const quizModal = document.getElementById('quiz-modal');
      if (quizModal) quizModal.classList.add('hidden');
      currentQuiz = null;
      const quizStatus = document.getElementById('quiz-status');
      if (quizStatus) quizStatus.textContent = 'No quiz active';
    });

    function startQuiz() {
      currentQuiz = {
        currentQuestion: 0,
        score: 0,
        answers: []
      };
      const quizStatus = document.getElementById('quiz-status');
      if (quizStatus) quizStatus.textContent = 'Quiz in progress...';
      showQuestion();
      const quizModal = document.getElementById('quiz-modal');
      if (quizModal) quizModal.classList.remove('hidden');
    }

    function showQuestion() {
      const question = quizQuestions[currentQuiz.currentQuestion];
      const quizQuestion = document.getElementById('quiz-question');
      if (quizQuestion) quizQuestion.textContent = question.question;
      
      const optionsDiv = document.getElementById('quiz-options');
      if (!optionsDiv) return;
      optionsDiv.innerHTML = '';
      
      question.options.forEach((option, index) => {
        const optionDiv = document.createElement('div');
        optionDiv.style.margin = '8px 0';
        
        const radio = document.createElement('input');
        radio.type = 'radio';
        radio.name = 'quiz-option';
        radio.value = index;
        radio.id = 'option-' + index;
        
        const label = document.createElement('label');
        label.htmlFor = 'option-' + index;
        label.textContent = option;
        label.style.color = '#cccccc';
        label.style.marginLeft = '8px';
        
        optionDiv.appendChild(radio);
        optionDiv.appendChild(label);
        optionsDiv.appendChild(optionDiv);
      });
    }

    function submitAnswer() {
      const selected = document.querySelector('input[name="quiz-option"]:checked');
      if (!selected) {
        showToast('Please select an answer');
        return;
      }
      
      const answer = parseInt(selected.value);
      const question = quizQuestions[currentQuiz.currentQuestion];
      
      currentQuiz.answers.push(answer);
      if (answer === question.correct) {
        currentQuiz.score++;
        showToast('Correct!');
      } else {
        showToast('Incorrect. Correct answer: ' + question.options[question.correct]);
      }
      
      currentQuiz.currentQuestion++;
      
      if (currentQuiz.currentQuestion < quizQuestions.length) {
        showQuestion();
      } else {
        endQuiz();
      }
    }

    function endQuiz() {
      const percentage = Math.round((currentQuiz.score / quizQuestions.length) * 100);
      const quizQuestion = document.getElementById('quiz-question');
      if (quizQuestion) quizQuestion.textContent = 'Quiz completed! Score: ' + currentQuiz.score + '/' + quizQuestions.length + ' (' + percentage + '%)';
      const optionsDiv = document.getElementById('quiz-options');
      if (optionsDiv) optionsDiv.innerHTML = '<button id="restart-quiz-btn" style="padding:8px 16px;background:#0e639c;color:#ffffff;border:1px solid #0e639c;border-radius:4px;cursor:pointer;">Restart Quiz</button>';
      const submitBtn = document.getElementById('submit-answer-btn');
      if (submitBtn) submitBtn.style.display = 'none';
      
      const restartBtn = document.getElementById('restart-quiz-btn');
      if (restartBtn) restartBtn.addEventListener('click', () => {
        const quizModal = document.getElementById('quiz-modal');
        if (quizModal) quizModal.classList.add('hidden');
        currentQuiz = null;
        const quizStatus = document.getElementById('quiz-status');
        if (quizStatus) quizStatus.textContent = 'No quiz active';
        const submitBtn2 = document.getElementById('submit-answer-btn');
        if (submitBtn2) submitBtn2.style.display = 'inline-block';
      });
      
      // Save quiz result to Firebase
      if (currentUser && currentProjectId) {
        const quizRef = db.ref('projects/' + currentProjectId + '/quizzes');
        quizRef.push({
          userId: currentUser.uid,
          score: currentQuiz.score,
          total: quizQuestions.length,
          timestamp: Date.now()
        });
      }
    }

    // Load project from URL (projects feature removed)
  </script>
