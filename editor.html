<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoPoly IDE – Editor</title>
  <link rel="stylesheet" href="css/editor.css">
  <style>
    .hidden {
      display: none !important;
    }

    .sidebar-panel {
      display: none;
    }

    .sidebar-panel.active {
      display: block;
    }

    .chat-floating-button {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #0e639c;
      color: #ffffff;
      border: none;
      box-shadow: 0 14px 28px rgba(0,0,0,0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      z-index: 4000;
    }

    .chat-window {
      position: fixed;
      bottom: 92px;
      right: 24px;
      width: 420px;
      max-width: calc(100vw - 48px);
      min-width: 380px;
      max-height: 520px;
      min-height: 420px;
      border-radius: 18px;
      background: rgba(28, 29, 40, 0.98);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
      overflow: visible;
      z-index: 4000;
      backdrop-filter: blur(10px);
    }

    .profile-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 22px;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      font-size: 12px;
    }

    .profile-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      background: #0e639c;
      color: #ffffff;
    }

    #user-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: #d1d5db;
    }

    #user-profile .profile-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      color: white;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
    }

    #user-profile .profile-name {
      display: flex;
      flex-direction: column;
      gap: 2px;
      color: #f1f5f9;
      font-size: 13px;
    }

    #user-profile .profile-name .name {
      font-weight: 700;
      color: #ffffff;
    }

    #user-profile .logout-btn {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(239, 68, 68, 0.3);
      background: rgba(239, 68, 68, 0.12);
      color: #fca5a5;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    #user-profile .logout-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .chat-header {
      position: relative;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      background: rgba(24, 25, 34, 0.96);
    }

    .chat-header span {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .chat-header button {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 32px;
      height: 32px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: background 0.2s ease;
    }

    .chat-header button:hover {
      background: rgba(255,255,255,0.14);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .chat-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(18,18,20,0.95);
    }

    .chat-input-tools {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .chat-tool-button {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-window.light .chat-input-row {
      background: #f4f4f6;
      border-top-color: rgba(0,0,0,0.08);
    }

    .emoji-picker {
      position: absolute;
      bottom: 68px;
      right: 16px;
      width: 260px;
      max-height: 240px;
      padding: 10px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      background: rgba(28,29,40,0.98);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      box-shadow: 0 16px 32px rgba(0,0,0,0.25);
      z-index: 4100;
      overflow-y: auto;
    }

    .emoji-picker button {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      font-size: 18px;
    }

    .emoji-picker.hidden {
      display: none;
    }

    .chat-input {
      flex: 1;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      background: rgba(8, 8, 12, 0.8);
      color: #ffffff;
      padding: 10px 12px;
      font-size: 13px;
      outline: none;
      margin-right: 8px;
    }

    .chat-window.light .chat-input {
      background: #ffffff;
      color: #222;
      border-color: rgba(0,0,0,0.12);
    }

    .chat-send-btn {
      min-width: 70px;
      border-radius: 14px;
      border: none;
      background: #0e639c;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      padding: 10px 18px;
      white-space: nowrap;
    }

    .chat-message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      font-size: 11px;
      line-height: 1.35;
    }

    .chat-message-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .chat-message-like-btn,
    .chat-message-pin-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.08);
      color: #ffffff;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    .chat-message-like-btn:hover,
    .chat-message-pin-btn:hover {
      background: rgba(255,255,255,0.14);
    }

    .chat-message-pin-btn.liked,
    .chat-message-like-btn.liked {
      background: #dc2626;
      border-color: rgba(220,38,38,0.4);
      color: #ffffff;
    }

    .chat-pinned-banner {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px 14px;
      margin: 0 12px 6px;
      border-radius: 14px;
      background: rgba(14, 99, 156, 0.12);
      border: 1px solid rgba(14, 99, 156, 0.3);
      color: #dbeafe;
      font-size: 12px;
      line-height: 1.4;
    }

    .chat-pinned-banner strong {
      color: #ffffff;
      font-size: 13px;
    }

    .chat-pinned-banner .pinned-text {
      color: #d1d5db;
      font-size: 12px;
    }

    .chat-message-like-btn:hover {
      background: rgba(255,255,255,0.14);
    }

    .chat-message-like-btn.liked {
      background: #dc2626;
      border-color: rgba(220,38,38,0.4);
      color: #ffffff;
    }

    .chat-message.light .timestamp {
      color: #6b7280;
    }

    .chat-message .sender {
      font-weight: 700;
      font-size: 11px;
    }

    .chat-message .timestamp {
      font-size: 9px;
      color: #8a8fbc;
    }

    .chat-message.light .timestamp {
      color: #6b7280;
    }
  </style>
</head>
<body>

  <div id="app-container" style="display:flex;flex-direction:column;min-height:100vh;">
    <!-- Top Header Bar -->
    <header id="app-header" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#1e1e1e;border-bottom:1px solid #333;color:#fff;">
      <div id="header-left" style="display:flex;align-items:center;gap:12px;">
        <h1 style="font-size:16px;margin:0;color:#ffffff;">EchoPoly IDE</h1>
        <span id="project-title" style="color:#9aa0c7;font-size:13px;">New Project</span>
        <div id="collab-status" style="display:none;color:#4ec9b0;font-size:12px;padding:4px 8px;background:#1e3a4a;border-radius:12px;border:1px solid #4ec9b0;">
          🔴 Live Collaboration
        </div>
      </div>
      <div id="header-actions" style="display:flex;align-items:center;gap:8px;">
        <button id="save-btn" style="padding: 8px 12px; margin-right: 8px;">💾 Save</button>
        <button id="share-btn" style="padding: 8px 12px; margin-right: 8px;">🔗 Share & Collaborate</button>
        <button id="run-code-header-btn" style="padding: 8px 12px; margin-right: 8px; background: #0e639c; color: #ffffff; border: 1px solid #0e639c; border-radius: 4px; cursor: pointer;">▶️ Run</button>
        <button id="preview-btn" style="padding: 8px 12px; margin-right: 8px;">👁️ Preview</button>
        <button id="settings-btn" style="padding: 8px 12px; margin-right: 10px;">⚙️ Settings</button>
        <div id="user-profile" style="padding: 8px 12px; display: flex; align-items: center;"></div>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" style="display:flex;flex:1;">
      <!-- Activity Bar -->
      <div id="activity-bar" style="width:48px;background:#252526;display:flex;flex-direction:column;gap:8px;padding:8px;">
        <button id="explorer-btn" title="Projects" class="activity-icon active">📁</button>
        <button id="users-btn" title="Users" class="activity-icon">👥</button>
        <button id="dashboard-btn" title="Dashboard" class="activity-icon">📊</button>
        <button id="quiz-btn" title="Quiz" class="activity-icon">🃏</button>
        <button id="output-btn" title="Output" class="activity-icon">▶️</button>
        <button id="settings-btn-sidebar" title="Settings" class="activity-icon">⚙️</button>
      </div>

      <!-- Sidebar -->
      <aside id="sidebar" style="width:260px;background:#1f1f1f;border-right:1px solid #333;padding:8px;">
        <div id="sidebar-controls" style="display:flex;justify-content:space-between;align-items:center;padding:0 0 8px;font-size:12px;color:#9aa0c7;">
          <span>Sidebar</span>
          <button id="sidebar-toggle-btn" style="padding:4px 8px;background:#2c2f42;color:#ffffff;border:1px solid #3e414f;border-radius:4px;cursor:pointer;">⇔</button>
        </div>
        <!-- Explorer Panel -->
        <div id="explorer-panel" class="sidebar-panel active">
          <div class="sidebar-header" style="color:#9aa0c7;margin-bottom:8px;">Files</div>
          <button id="new-file-btn" style="width: 100%; padding: 8px 12px; margin: 8px 0; background: #3e3e42; color: #cccccc; border: 1px solid #555; border-radius: 4px; cursor: pointer;">➕ New File</button>
          <div id="file-list" class="sidebar-content" style="padding: 8px; max-height: calc(100vh - 240px); overflow-y: auto;"></div>
        </div>

        <!-- Users Panel -->
        <div id="users-panel" class="sidebar-panel hidden">
          <div class="sidebar-header">Active Users</div>
          <div id="active-users" class="sidebar-content" style="padding: 8px;"></div>
        </div>

        <!-- Dashboard Panel -->
        <div id="dashboard-panel" class="sidebar-panel hidden">
          <div class="sidebar-header">Dashboard</div>
          <div id="dashboard-content" class="sidebar-content" style="padding: 8px; color: #cccccc; font-size: 12px;"></div>
        </div>

        <!-- Quiz Panel -->
        <div id="quiz-panel" class="sidebar-panel hidden">
          <div class="sidebar-header">Flashcard Quiz</div>
          <div class="sidebar-content" style="padding: 8px; color: #cccccc; font-size: 12px;">
            <button id="start-quiz-btn" style="width: 100%; padding: 8px; margin-bottom: 8px; background: #0e639c; color: #ffffff; border: 1px solid #0e639c; border-radius: 4px; cursor: pointer;">Start Quiz</button>
            <div id="quiz-status">No quiz active</div>
          </div>
        </div>

        <!-- Settings Panel -->
        <div id="settings-panel" class="sidebar-panel hidden">
          <div class="sidebar-header">Settings</div>
          <div class="sidebar-content" style="padding: 8px; color: #cccccc; font-size: 12px;">
            <button id="logout-btn" style="width: 100%; padding: 8px; margin-top: 8px; background: #0e639c; color: #ffffff; border: 1px solid #0e639c; border-radius: 4px; cursor: pointer;">Logout</button>
          </div>
        </div>

        <!-- Output Panel -->
        <div id="output-panel" class="sidebar-panel hidden">
          <div class="sidebar-header">Output</div>
          <div class="sidebar-content" style="padding: 8px;">
            <button id="run-code-btn" style="width: 100%; padding: 8px; margin-bottom: 8px; background: #0e639c; color: #ffffff; border: 1px solid #0e639c; border-radius: 4px; cursor: pointer;">▶️ Run Code</button>
            <div id="output-console" style="background: #1e1e1e; border: 1px solid #3e3e42; border-radius: 4px; padding: 8px; height: 300px; overflow-y: auto; font-family: 'Consolas', 'Monaco', monospace; font-size: 12px; color: #d4d4d4; white-space: pre-wrap;"></div>
            <button id="clear-output-btn" style="width: 100%; padding: 6px; margin-top: 8px; background: #3e3e42; color: #cccccc; border: 1px solid #555; border-radius: 4px; cursor: pointer;">🗑️ Clear Output</button>
          </div>
        </div>
      </aside>
      <div id="sidebar-resizer" class="resizer" title="Drag to resize sidebar"></div>

      <!-- Editor Area -->
      <div id="editor-area" style="flex:1;display:flex;flex-direction:column;">
        <div id="tab-bar" style="display:flex;gap:0;border-bottom:1px solid #3e3e42;background:#252526;overflow-x:auto;"></div>
        <div id="editor-container" style="flex:1;display:flex;">
          <div id="editor" style="flex:1;">
            <div id="monaco-editor" style="height:calc(100vh - 140px);"></div>
          </div>
          <div id="preview-resizer" class="resizer" title="Drag to resize preview" style="display:none"></div>
          <div id="preview-panel" style="width:400px;border-left:1px solid #3e3e42;background:#1e1e1e;display:none;">
            <div style="padding:8px;color:#cccccc;border-bottom:1px solid #3e3e42;">Preview</div>
            <iframe id="preview-iframe" style="width:100%;height:calc(100vh - 168px);border:none;background:#ffffff;"></iframe>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Login Modal -->
  <div id="login-modal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:3000;">
    <div class="modal-content" style="width:400px;background:#2d2d30;border:1px solid #3e3e42;padding:20px;border-radius:6px;">
      <h3 style="color:#cccccc;margin-top:0;">Login to EchoPoly</h3>
      
      <div style="margin-bottom:16px;">
        <label style="display:block;color:#cccccc;font-size:13px;margin-bottom:6px;">Email:</label>
        <input type="email" id="login-email" placeholder="Enter your email" style="width:100%;padding:8px;background:#1e1e1e;color:#ffffff;border:1px solid #3e3e42;border-radius:4px;box-sizing:border-box;font-size:13px;">
      </div>
      
      <div style="margin-bottom:16px;">
        <label style="display:block;color:#cccccc;font-size:13px;margin-bottom:6px;">Password:</label>
        <input type="password" id="login-password" placeholder="Enter your password" style="width:100%;padding:8px;background:#1e1e1e;color:#ffffff;border:1px solid #3e3e42;border-radius:4px;box-sizing:border-box;font-size:13px;">
      </div>
      
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button id="login-submit" style="flex:1;padding:8px 16px;background:#0e639c;color:#ffffff;border:1px solid #0e639c;border-radius:4px;cursor:pointer;">Email Login</button>
      </div>

      <div style="display:flex;align-items:center;margin-bottom:12px;gap:8px;">
        <div style="flex:1;height:1px;background:#3e3e42;"></div>
        <span style="color:#8a8fbc;font-size:12px;">OR</span>
        <div style="flex:1;height:1px;background:#3e3e42;"></div>
      </div>

      <button id="google-login-btn" style="width:100%;padding:10px 16px;background:#ffffff;color:#1f1f23;border:1px solid #e0e0e0;border-radius:4px;cursor:pointer;font-weight:500;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:8px;">
        <span style="font-size:16px;">🔵</span> Sign in with Google
      </button>

      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="guest-login-btn" style="padding:8px 16px;background:#2d2d30;color:#ffffff;border:1px solid #555;border-radius:4px;cursor:pointer;">Continue as Guest</button>
      </div>
      
      <p style="margin:8px 0 0;color:#cccccc;font-size:12px;">Don't have an account? <a href="register.html" style="color:#0e639c;text-decoration:none;">Register</a></p>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:2000;">
    <div class="modal-content" style="width:480px;background:#2d2d30;border:1px solid #3e3e42;padding:20px;border-radius:6px;">
      <h3 style="color:#cccccc;margin-top:0;">Settings</h3>
      
      <label style="display:block;margin:15px 0;color:#cccccc;">
        <input type="checkbox" id="autosave-toggle" checked style="margin-right:8px;"> Autosave
      </label>
      
      <label style="display:block;margin:15px 0;color:#cccccc;">
        Font Size:
        <select id="font-size-select" style="margin-left:8px;padding:6px;background:#3e3e42;color:#cccccc;border:1px solid #555;">
          <option value="12">12px</option>
          <option value="14">14px</option>
          <option value="16" selected>16px</option>
          <option value="18">18px</option>
          <option value="20">20px</option>
        </select>
      </label>

      <label style="display:block;margin:15px 0;color:#cccccc;">
        Theme:
        <select id="theme-select" style="margin-left:8px;padding:6px;background:#3e3e42;color:#cccccc;border:1px solid #555;">
          <option value="dark" selected>Dark</option>
          <option value="light">Light</option>
        </select>
      </label>
      
      <div style="margin-top:20px;display:flex;gap:10px;justify-content:flex-end;">
        <button id="close-settings" style="padding:8px 16px;background:#3e3e42;color:#cccccc;border:1px solid #555;border-radius:4px;cursor:pointer;">Close</button>
      </div>
    </div>
  </div>

  <!-- New File Modal -->
  <div id="new-file-modal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:2000;">
    <div class="modal-content" style="width:400px;background:#2d2d30;border:1px solid #3e3e42;padding:20px;border-radius:6px;">
      <h3 style="margin-top:0;color:#ffffff;font-size:18px;">Create New File</h3>
      
      <div style="margin-bottom:16px;">
        <label style="display:block;color:#cccccc;font-size:13px;margin-bottom:6px;">Filename:</label>
        <input type="text" id="new-file-name" placeholder="Enter filename (e.g., script.js)" style="width:100%;padding:8px;background:#1e1e1e;color:#ffffff;border:1px solid #3e3e42;border-radius:4px;box-sizing:border-box;font-size:13px;">
      </div>
      
      <div style="margin-bottom:16px;">
        <label style="display:block;color:#cccccc;font-size:13px;margin-bottom:6px;">Language:</label>
        <select id="new-file-language" style="width:100%;padding:8px;background:#1e1e1e;color:#ffffff;border:1px solid #3e3e42;border-radius:4px;font-size:13px;">
          <option value="javascript">JavaScript (.js)</option>
          <option value="python">Python (.py)</option>
          <option value="html">HTML (.html)</option>
          <option value="css">CSS (.css)</option>
          <option value="java">Java (.java)</option>
          <option value="cpp">C++ (.cpp)</option>
          <option value="typescript">TypeScript (.ts)</option>
          <option value="json">JSON (.json)</option>
          <option value="markdown">Markdown (.md)</option>
          <option value="sql">SQL (.sql)</option>
          <option value="shell">Shell (.sh)</option>
        </select>
      </div>
      
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button id="cancel-new-file" style="padding:8px 16px;background:#3e3e42;color:#cccccc;border:1px solid #555;border-radius:4px;cursor:pointer;">Cancel</button>
        <button id="create-new-file" style="padding:8px 16px;background:#0e639c;color:#ffffff;border:1px solid #0e639c;border-radius:4px;cursor:pointer;">Create</button>
      </div>
    </div>
  </div>

  <!-- Quiz Modal -->
  <div id="quiz-modal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;justify-content:center;align-items:center;z-index:2000;">
    <div class="modal-content" style="width:500px;background:#2d2d30;border:1px solid #3e3e42;padding:20px;border-radius:6px;">
      <h3 style="margin-top:0;color:#ffffff;font-size:18px;">Flashcard Quiz</h3>
      
      <div id="quiz-question" style="margin:20px 0;color:#cccccc;font-size:16px;"></div>

      outputConsole.scrollTop = outputConsole.scrollHeight;

      // Execute based on language

        executeJavaScript(code);

      }

    function executeJavaScript(code) {
      const outputConsole = document.getElementById('output-console');
      
      // Create a safe execution environment
      const logs = [];
      const errors = [];
      
      // Override console methods to capture output
      const originalConsole = {
        log: console.log,
        error: console.error,
        warn: console.warn,
        info: console.info
      };

      console.log = (...args) => {
        logs.push(args.map(arg => 
          typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
        ).join(' '));
        originalConsole.log(...args);
      };

      console.error = (...args) => {
        errors.push(args.map(arg => 
          typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
        ).join(' '));
        originalConsole.error(...args);
      };

      console.warn = (...args) => {
        logs.push('⚠️ ' + args.map(arg => 
          typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
        ).join(' '));
        originalConsole.warn(...args);
      };

      console.info = (...args) => {
        logs.push('ℹ️ ' + args.map(arg => 
          typeof arg === 'object' ? JSON.stringify(arg, null, 2) : String(arg)
        ).join(' '));
        originalConsole.info(...args);
      };

      try {
        // Execute the code
        const result = eval(code);
        
        // Restore original console
        console.log = originalConsole.log;
        console.error = originalConsole.error;
        console.warn = originalConsole.warn;
        console.info = originalConsole.info;

        // Display output
        let output = '';
        
        if (logs.length > 0) {
          output += logs.join('\n') + '\n';
        }
        
        if (errors.length > 0) {
          output += 'Errors:\n' + errors.join('\n') + '\n';
        }
        
        if (result !== undefined) {
          output += 'Result: ' + (typeof result === 'object' ? JSON.stringify(result, null, 2) : String(result)) + '\n';
        }

        if (!output.trim()) {
          output = 'Code executed successfully (no output)\n';
        }

        appendToOutput(output, errors.length > 0 ? 'error' : 'success');
        
      } catch (error) {
        // Restore original console
        console.log = originalConsole.log;
        console.error = originalConsole.error;
        console.warn = originalConsole.warn;
        console.info = originalConsole.info;

        appendToOutput('Error: ' + error.message + '\n', 'error');
      }
    }

    function appendToOutput(text, type = 'normal') {

      const outputSpan = document.createElement('span');
      outputSpan.textContent = prefix + text;

      } else if (type === 'success') {
        outputSpan.style.color = '#4ec9b0';
      } else {
        outputSpan.style.color = '#d4d4d4';
      }
      
      outputConsole.appendChild(outputSpan);
      outputConsole.scrollTop = outputConsole.scrollHeight;
    }

      if (!db || !currentProjectId || isRemoteUpdate || !changes) return;

      try {

    function applyRemoteEditorChange(data) {
      if (isRemoteUpdate || !data) return;
      
      isRemoteUpdate = true;
      try {
        if (editorInstance) {
          // Handle Monaco editor
          const model = editorInstance.getModel();
          if (model) {
            if (data.isFullContent) {
              // Full content update
              model.setValue(data.text || '');
            } else {
              // Partial change
              const range = new monaco.Range(
                data.range.startLineNumber || 1,
                data.range.startColumn || 1,
                data.range.endLineNumber || 1,
                data.range.endColumn || 1
              );
              
              const editOperation = {
                range: range,
                text: data.text || ''
              };
              
              model.pushEditOperations([], [editOperation], () => null);
            }
          }
        } else if (fallbackEditor) {
          // Handle fallback textarea
          if (data.isFullContent) {
            fallbackEditor.value = data.text || '';
          }
        }
      } catch (error) {
        console.error('Error applying remote editor change:', error);
      } finally {
        isRemoteUpdate = false;
      }
    }

    function updateRemoteCursor(data) {
      // Update remote user cursor positions (for future enhancement)
      remoteCursors[data.userId] = {
        position: data.position,
        userName: data.userName,
        timestamp: Date.now()
      };
      
      // Clean up old cursors (older than 30 seconds)
      const now = Date.now();
      Object.keys(remoteCursors).forEach(userId => {
        if (now - remoteCursors[userId].timestamp > 30000) {
          delete remoteCursors[userId];
        }
      });
    }

      const presenceData = {

        username: getUserName(currentUser),
        online: !!online,
        activeSeconds,
        startedAt: online ? Date.now() : (localUser && localUser.startedAt) || Date.now(),
        lastSeen: Date.now()
      };
      currentUserPresenceRef.set(presenceData).catch(err => {
        console.warn('Presence update failed:', err);
      });
    }

    function setupPresenceListener(projectId) {
      if (!db || !projectId) return;
      if (presenceRef) {
        presenceRef.off();
      }

      presenceRef = db.ref('projectPresence/' + projectId);
      presenceRef.on('value', snapshot => {
        const raw = snapshot.val() || {};
        const users = Object.keys(raw).map(uid => {
          const item = raw[uid] || {};
          return {
            id: uid,
            name: item.name || 'Guest',
            username: item.username || ('user_' + uid.slice(0, 6)),
            role: uid === (currentUser && currentUser.uid) ? 'You' : 'Participant',
            avatar: (item.name || 'G').charAt(0).toUpperCase(),
            status: item.online ? 'Online' : 'Away',
            online: !!item.online,
            activeSeconds: item.activeSeconds || 0,
            startedAt: item.startedAt || Date.now(),
            lastSeen: item.lastSeen || Date.now(),
            isLocal: uid === (currentUser && currentUser.uid)
          };
        });

        if (currentUser && !users.some(u => u.id === currentUser.uid)) {
          users.unshift({
            id: currentUser.uid,
            name: getUserDisplayName(currentUser),
            username: getUserName(currentUser),
            role: 'You',
            avatar: getUserDisplayName(currentUser).charAt(0).toUpperCase(),
            status: 'Offline',
            online: false,
            activeSeconds: 0,
            startedAt: Date.now(),
            lastSeen: Date.now(),
            isLocal: true
          });
        }

        activeUsersData = users;
        renderActiveUsers();
        renderDashboardMetrics();
      });

      if (currentUser) {
        setCurrentUserPresence(true);
      }
    }

    function updateLocalUserVisibility(isVisible) {
      const localUser = getLocalUser();
      if (!localUser) return;
      localUser.online = isVisible;
      localUser.status = isVisible ? 'Online' : 'Away';
      if (currentUser) {
        setCurrentUserPresence(isVisible);
      }
      renderActiveUsers();
      renderDashboardMetrics();
    }

    function initChat() {
      currentGuest = currentGuest || getGuestInfo();
      currentUserRole = getChatUserRole();
      updateChatHeader();
      console.debug('initChat', { currentProjectId, hasWindowIo: !!window.io, hasIo: typeof io !== 'undefined' });

      const socketFactory = window.io || (typeof io !== 'undefined' ? io : null);
      if (socketFactory) {
        try {
          socket = socketFactory();
          socket.on('connect', () => {
            console.debug('Socket connected', socket.id);
            if (currentProjectId) {
              socket.emit('joinProject', {
                projectId: currentProjectId,
                user: {
                  id: userId || currentGuest.id,
                  name: getChatSenderName(),
                  username: getChatSenderUsername(),
                  role: currentUserRole
                }
              });
              socket.emit('openProject', {
                projectId: currentProjectId
              });

              // Show collaboration welcome message
              if (isCollaborationMode()) {
                setTimeout(() => {
                  addSystemChat('🎉 Welcome to collaborative coding! You can now code together with others in real-time.');
                }, 1000);
              }
            }
          });

          socket.on('connect_error', (err) => {
            console.error('Socket connect error', err);
          });

          socket.on('disconnect', (reason) => {
            console.debug('Socket disconnected', reason);
          });
        } catch (error) {
          console.error('Error initializing Socket.io:', error);
          socket = null;
        }

        socket.on('newMessage', message => {
          console.debug('received newMessage', message);
          addChatMessage(message);
        });

        socket.on('activeUsersUpdate', users => {
          console.debug('activeUsersUpdate', users);
          const localId = userId || (currentGuest && currentGuest.id);
          activeUsersData = users.map(user => ({
            ...user,
            isLocal: user.id === localId,
            activeSeconds: user.activeSeconds || 0
          }));
          renderActiveUsers();
          renderDashboardMetrics();
          updateCollaborationStatus();
        });

        socket.on('participantJoined', data => {
          if (data?.user) {
            addSystemChat(`${data.user.name} joined the collaboration.`);
          }
          updateCollaborationStatus();
        });

        socket.on('participantLeft', data => {
          if (data?.user) {
            addSystemChat(`${data.user.name} left the collaboration.`);
          }
          updateCollaborationStatus();
        });

        socket.on('projectDetails', data => {
          console.debug('projectDetails received', data);
          if (!data || !data.projectId) return;
          applyProjectDetails(data);
        });

        // Collaborative editor events
        socket.on('editorContentUpdate', data => {
          try {
            const currentUserId = userId || (currentGuest && currentGuest.id);
            if (data && data.userId && currentUserId && data.userId !== currentUserId) {
              applyRemoteEditorChange(data);
            }
          } catch (error) {
            console.error('Error handling editor content update:', error);
          }
        });

        socket.on('cursorPositionUpdate', data => {
          try {
            const currentUserId = userId || (currentGuest && currentGuest.id);
            if (data && data.userId && currentUserId && data.userId !== currentUserId) {
              updateRemoteCursor(data);
            }
          } catch (error) {
            console.error('Error handling cursor position update:', error);
          }
        });

        socket.on('projectShared', data => {
          try {
            if (data && data.sharedBy) {
              addSystemChat(`${data.sharedBy} shared the project! Others can now join.`);
            }
          } catch (error) {
            console.error('Error handling project shared event:', error);
          }
        });
      }

      if (currentProjectId) {
        loadChatHistory(currentProjectId);
        setupChatListeners(currentProjectId);
        setupEditorSync(currentProjectId);
      }
    }

    function applyProjectDetails(data) {
      currentProjectId = data.projectId || currentProjectId;
      const projectTitle = document.getElementById('project-title');
      if (projectTitle && data.title) {
        projectTitle.textContent = data.title;
      }
      const savedState = loadProjectStateFromLocal(currentProjectId);
      if (savedState && Array.isArray(savedState.openTabs) && savedState.openTabs.length > 0) {
        openTabs = savedState.openTabs;
        currentTabId = savedState.currentTabId || savedState.openTabs[0].id;
        initializeProjectTabs();
      } else if (Array.isArray(data.openTabs) && data.openTabs.length > 0) {
        openTabs = data.openTabs;
        currentTabId = data.currentTabId || data.openTabs[0].id;
        initializeProjectTabs();
      } else {
        if (!currentTabId || openTabs.length === 0) {
          currentProjectId = currentProjectId || getProjectIdFromUrl() || loadLastProjectId() || 'project-' + Date.now();
          initializeProjectTabs();
        }
      }
      updateChatHeader();
      saveProjectStateToLocal();
    }

    function ensureChatMessageData(message) {
      if (!message || typeof message !== 'object') return null;
      const likedBy = Array.isArray(message.likedBy) ? [...new Set(message.likedBy)] : [];
      return {
        ...message,
        likedBy,
        likes: likedBy.length,
        pinnedBy: message.pinnedBy || null,
        pinnedByName: message.pinnedByName || null,
        pinnedAt: message.pinnedAt || null,
        text: message.text || '',
        timestamp: message.timestamp || Date.now()
      };
    }

    function getCurrentChatUserId() {
      return userId || (currentGuest && currentGuest.id) || null;
    }

    function setupChatListeners(projectId) {
      if (!db || !projectId) return;
      if (chatHistoryRef) {
        chatHistoryRef.off();
        chatHistoryRef = null;
      }
      chatHistoryRef = db.ref('projectChats/' + projectId);
      chatHistoryRef.orderByChild('timestamp').limitToLast(200).on('child_added', snapshot => {
        const message = ensureChatMessageData(snapshot.val());
        if (message) addChatMessage(message);
      });
      chatHistoryRef.on('child_changed', snapshot => {
        const message = ensureChatMessageData(snapshot.val());
        if (!message || !message.id) return;
        const index = chatMessages.findIndex(msg => msg.id === message.id);
        if (index !== -1) {
          chatMessages[index] = message;
          renderChatMessages();
          scrollChatToBottom();
        }
      });
    }

    function loadChatHistory(projectId) {
      if (!db || !projectId) return;
      db.ref('projectChats/' + projectId).orderByChild('timestamp').limitToLast(200).once('value', snapshot => {
        const raw = snapshot.val() || {};
        chatMessages = Object.keys(raw).sort((a, b) => raw[a].timestamp - raw[b].timestamp).map(key => ensureChatMessageData(raw[key])).filter(Boolean);
        renderChatMessages();
        scrollChatToBottom();
      });
    }

    function addChatMessage(message) {
      if (!message || !message.id) return;
      if (chatMessages.some(msg => msg.id === message.id)) return;
      chatMessages.push(ensureChatMessageData(message));
      renderChatMessages();
      scrollChatToBottom();
    }

    function addSystemChat(text) {
      if (!text) return;
      const message = {
        id: 'sys-' + Date.now() + '-' + Math.random().toString(36).slice(2),
        senderName: 'System',
        senderRole: 'System',
        text,
        timestamp: Date.now(),
        isSystem: true
      };
      addChatMessage(message);
    }

    function updateChatHeader() {
      const chatHeader = document.querySelector('#chat-window .chat-header span');
      if (!chatHeader) return;
      chatHeader.textContent = currentProjectId ? `Project Chat — ${currentProjectId}` : 'Project Chat';
    }

    function renderChatMessages() {
      const messagesContainer = document.getElementById('chat-messages');
      if (!messagesContainer) return;
      messagesContainer.innerHTML = '';

      renderPinnedBanner();
      chatMessages.forEach(message => {
        const messageRow = document.createElement('div');
        messageRow.className = 'chat-message' + (document.body.classList.contains('light-mode') ? ' light' : '');

        const sender = document.createElement('div');
        sender.className = 'sender';
        sender.textContent = message.isSystem ? 'System' : `${message.senderName} (${message.senderRole})`;
        messageRow.appendChild(sender);

        if (message.type === 'snippet' && message.snippet) {
          const snippetBox = document.createElement('pre');
          snippetBox.textContent = message.snippet;
          snippetBox.style.margin = '8px 0 0';
          snippetBox.style.padding = '10px';
          snippetBox.style.borderRadius = '12px';
          snippetBox.style.background = document.body.classList.contains('light-mode') ? '#f6f7fb' : '#15161d';
          snippetBox.style.color = document.body.classList.contains('light-mode') ? '#111' : '#f5f5f7';
          snippetBox.style.whiteSpace = 'pre-wrap';
          snippetBox.style.wordBreak = 'break-word';
          snippetBox.style.fontSize = '12px';
          snippetBox.style.fontFamily = 'Consolas, monospace, monospace';
          messageRow.appendChild(snippetBox);
        }

        const text = document.createElement('div');
        text.textContent = message.text;
        messageRow.appendChild(text);

        const actions = document.createElement('div');
        actions.className = 'chat-message-actions';

        const likeButton = document.createElement('button');
        likeButton.type = 'button';
        likeButton.className = 'chat-message-like-btn';
        const currentUserId = getCurrentChatUserId();
        const alreadyLiked = currentUserId && Array.isArray(message.likedBy) && message.likedBy.includes(currentUserId);
        if (alreadyLiked) {
          likeButton.classList.add('liked');
        }
        likeButton.innerHTML = `${alreadyLiked ? '❤' : '♡'} <span>${message.likes || 0}</span>`;
        likeButton.title = alreadyLiked ? 'Unlike this message' : 'Like this message';
        likeButton.addEventListener('click', () => toggleChatMessageLike(message.id));
        actions.appendChild(likeButton);

        const pinned = message.pinnedAt && message.pinnedBy;
        const pinButton = document.createElement('button');
        pinButton.type = 'button';
        pinButton.className = 'chat-message-pin-btn';
        if (pinned) pinButton.classList.add('liked');
        pinButton.innerHTML = `${pinned ? '📌' : '📍'} <span>${pinned ? 'Pinned' : 'Pin'}</span>`;
        pinButton.title = pinned ? 'Unpin this message' : 'Pin this message';
        pinButton.addEventListener('click', () => toggleChatMessagePin(message.id));
        actions.appendChild(pinButton);

        messageRow.appendChild(actions);

        const timestamp = document.createElement('div');
        timestamp.className = 'timestamp';
        timestamp.textContent = new Date(message.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        messageRow.appendChild(timestamp);

        messagesContainer.appendChild(messageRow);
      });
    }

    function getPinnedMessage() {
      const pinned = chatMessages.filter(msg => msg.pinnedAt && msg.pinnedBy);
      if (!pinned.length) return null;
      return pinned.sort((a, b) => b.pinnedAt - a.pinnedAt)[0];
    }

    function renderPinnedBanner() {
      const pinnedBanner = document.getElementById('chat-pinned-banner');
      if (!pinnedBanner) return;
      const pinnedMessage = getPinnedMessage();
      if (!pinnedMessage) {
        pinnedBanner.classList.add('hidden');
        pinnedBanner.innerHTML = '';
        return;
      }
      pinnedBanner.classList.remove('hidden');
      pinnedBanner.innerHTML = `<strong>Pinned message</strong><div class="pinned-text">${pinnedMessage.text}</div><div style="font-size:10px;color:rgba(209,213,219,0.85);">Pinned by ${pinnedMessage.pinnedByName || pinnedMessage.pinnedBy} • ${new Date(pinnedMessage.pinnedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>`;
    }

    function toggleChatMessageLike(messageId) {
      const currentUserId = getCurrentChatUserId();
      if (!currentUserId || !messageId || !currentProjectId) return;

      const index = chatMessages.findIndex(msg => msg.id === messageId);
      if (index === -1) return;

      const message = chatMessages[index];
      const likedBy = Array.isArray(message.likedBy) ? [...message.likedBy] : [];
      const alreadyLiked = likedBy.includes(currentUserId);
      if (alreadyLiked) {
        message.likedBy = likedBy.filter(id => id !== currentUserId);
      } else {
        likedBy.push(currentUserId);
        message.likedBy = [...new Set(likedBy)];
      }
      message.likes = Array.isArray(message.likedBy) ? message.likedBy.length : 0;
      chatMessages[index] = message;
      renderChatMessages();
      scrollChatToBottom();

      if (db) {
        db.ref('projectChats/' + currentProjectId + '/' + messageId).update({ likedBy: message.likedBy }).catch(err => {
          console.warn('Failed to update message like count:', err);
        });
      }

      if (socket) {
        try {
          socket.emit('messageLiked', {
            projectId: currentProjectId,
            messageId,
            userId: currentUserId,
            action: alreadyLiked ? 'unlike' : 'like'
          });
        } catch (err) {
          console.warn('messageLiked socket emit failed', err);
        }
      }
    }

    function toggleChatMessagePin(messageId) {
      const currentUserId = getCurrentChatUserId();
      if (!currentUserId || !messageId || !currentProjectId) return;

      const index = chatMessages.findIndex(msg => msg.id === messageId);
      if (index === -1) return;

      const message = chatMessages[index];
      const currentlyPinned = message.pinnedAt && message.pinnedBy;
      if (currentlyPinned) {
        message.pinnedAt = null;
        message.pinnedBy = null;
        message.pinnedByName = null;
      } else {
        message.pinnedAt = Date.now();
        message.pinnedBy = currentUserId;
        message.pinnedByName = getChatSenderName();
      }

      chatMessages[index] = message;
      renderChatMessages();
      scrollChatToBottom();

      if (db) {
        db.ref('projectChats/' + currentProjectId + '/' + messageId).update({
          pinnedAt: message.pinnedAt || null,
          pinnedBy: message.pinnedBy || null,
          pinnedByName: message.pinnedByName || null
        }).catch(err => {
          console.warn('Failed to update pinned message:', err);
        });
      }

      if (socket) {
        try {
          socket.emit('messagePinned', {
            projectId: currentProjectId,
            messageId,
            userId: currentUserId,
            action: currentlyPinned && message.pinnedBy === null ? 'unpin' : 'pin'
          });
        } catch (err) {
          console.warn('messagePinned socket emit failed', err);
        }
      }
    }

    function scrollChatToBottom() {
      const messagesContainer = document.getElementById('chat-messages');
      if (!messagesContainer) return;
      setTimeout(() => {
        messagesContainer.scrollTo({ top: messagesContainer.scrollHeight, behavior: 'smooth' });
      }, 50);
    }

    function insertEmojiAtCursor(emoji) {
      const input = document.getElementById('chat-input');
      if (!input) return;
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const value = input.value;
      input.value = value.slice(0, start) + emoji + value.slice(end);
      input.focus();
      const position = start + emoji.length;
      input.setSelectionRange(position, position);
    }

    function toggleEmojiPicker() {
      const picker = document.getElementById('emoji-picker');
      if (!picker) return;
      picker.classList.toggle('hidden');
    }

    function promptChatSnippet() {
      const snippet = prompt('Paste code snippet or markdown here:');
      if (!snippet) return;
      const summary = prompt('Optional message summary:') || 'Code snippet shared';
      const message = {
        id: 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2),
        projectId: currentProjectId,
        senderId: userId || currentGuest.id,
        senderName: getChatSenderName(),
        senderRole: getChatUserRole(),
        text: summary,
        snippet,
        type: 'snippet',
        timestamp: Date.now(),
        likes: 0,
        likedBy: []
      };

      if (socket) {
        socket.emit('sendMessage', message);
      }
      if (db) {
        db.ref('projectChats/' + currentProjectId + '/' + message.id).set(message).catch(err => {
          console.warn('Chat save failed:', err);
        });
      }
      addChatMessage(message);
    }

    function sendChatMessage() {
      const input = document.getElementById('chat-input');
      if (!input) return;
      const chatWindow = document.getElementById('chat-window');
      if (chatWindow && chatWindow.classList.contains('hidden')) {
        chatWindow.classList.remove('hidden');
      }

      const text = input.value.trim();
      if (!text) {
        showToast('Type a message before sending');
        return;
      }
      if (!currentProjectId) {
        currentProjectId = getProjectIdFromUrl() || loadLastProjectId() || 'project-' + Date.now();
        updateChatHeader();
      }

      const message = {
        id: 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2),
        projectId: currentProjectId,
        senderId: userId || currentGuest.id,
        senderName: getChatSenderName(),
        senderRole: getChatUserRole(),
        text,
        timestamp: Date.now(),
        likes: 0,
        likedBy: []
      };

      if (!socket) {
        initChat();
      }
      if (socket) {
        try {
          socket.emit('sendMessage', message);
        } catch (err) {
          console.warn('sendMessage socket emit failed', err);
        }
      }
      if (db) {
        db.ref('projectChats/' + currentProjectId + '/' + message.id).set(message).catch(err => {
          console.warn('Chat save failed:', err);
        });
      }
      console.debug('sendChatMessage', message, { socketConnected: !!socket });
      addChatMessage(message);
      scrollChatToBottom();
      input.value = '';
    }

    function hideEmojiPicker() {
      const picker = document.getElementById('emoji-picker');
      if (!picker) return;
      if (!picker.classList.contains('hidden')) {
        picker.classList.add('hidden');
      }
    }

    function toggleChatWindow() {
      const chatWindow = document.getElementById('chat-window');
      if (!chatWindow) return;
      chatWindow.classList.toggle('hidden');
      if (!chatWindow.classList.contains('hidden')) {
        scrollChatToBottom();
      }
    }

    function openGuestSession() {
      currentGuest = getGuestInfo();
      currentUser = null;
      userId = currentGuest.id;
      currentUserRole = 'Guest';
      renderUserProfile();
      const loginModal = document.getElementById('login-modal');
      if (loginModal) loginModal.classList.add('hidden');
      const appContainer = document.getElementById('app-container');
      if (appContainer) appContainer.style.display = 'flex';
      if (!currentProjectId) {
        currentProjectId = getProjectIdFromUrl() || loadLastProjectId() || 'project-' + Date.now();
      }
      initChat();
      ensureEditorLayout();
    }

    function loadStoredCurrentUser() {
      try {
        const raw = localStorage.getItem('currentUser');
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object' && (parsed.uid || parsed.email)) {
          return parsed;
        }
      } catch (err) {
        console.warn('Failed to parse currentUser from localStorage', err);
      }
      return null;
    }

    function restoreStoredUserSession() {
      const stored = loadStoredCurrentUser();
      if (stored) {
        currentUser = stored;
        userId = stored.uid || null;
        currentUserRole = getUserRole(stored);
        renderUserProfile();
        return true;
      }
      return false;
    }

    function setupFallbackEditor() {
      const textarea = document.getElementById('fallback-editor');
      if (!textarea) return;
      fallbackEditor = textarea;
      textarea.addEventListener('input', () => {
        isSaved = false;
        scheduleSave();
        updatePreview();
        
        // Emit collaborative changes for fallback editor
        if (socket && socket.connected) {
          socket.emit('editorContentUpdate', {
            userId: userId || (currentGuest && currentGuest.id),
            range: { startLineNumber: 1, startColumn: 1, endLineNumber: 1, endColumn: 1 },
            text: textarea.value,
            projectId: currentProjectId,
            isFullContent: true
          });
        }
      });
    }

    // Auth state handler - will be called during initialize()
    function setupAuthStateListener() {
      if (auth && typeof auth.onAuthStateChanged === 'function') {
        auth.onAuthStateChanged(user => {
          if (user) {
            currentUser = user;
            userId = user.uid;
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('app-container').style.display = 'flex';
            currentUserRole = getUserRole(user);
            renderUserProfile();
            if (!currentProjectId) {
              currentProjectId = getProjectIdFromUrl() || loadLastProjectId() || 'project-' + Date.now();
            }
            initChat();
            ensureEditorLayout();
          } else {
            const storedUser = loadStoredCurrentUser();
            if (storedUser) {
              currentUser = storedUser;
              userId = storedUser.uid || null;
              document.getElementById('login-modal').classList.add('hidden');
              document.getElementById('app-container').style.display = 'flex';
              currentUserRole = getUserRole(storedUser);
              renderUserProfile();
              if (!currentProjectId) {
                currentProjectId = getProjectIdFromUrl() || loadLastProjectId() || 'project-' + Date.now();
              }
              initChat();
              ensureEditorLayout();
            } else {
              // User is not authenticated - redirect to login page
              const currentUrl = window.location.href;
              sessionStorage.setItem('redirectAfterLogin', currentUrl);
              window.location.href = 'login.html';
            }
          }
        });
      } else {
        const storedUser = loadStoredCurrentUser();
        if (storedUser) {
          currentUser = storedUser;
          userId = storedUser.uid || null;
          document.getElementById('login-modal').classList.add('hidden');
          document.getElementById('app-container').style.display = 'flex';
          currentUserRole = getUserRole(storedUser);
          renderUserProfile();
          if (!currentProjectId) {
            currentProjectId = getProjectIdFromUrl() || loadLastProjectId() || 'project-' + Date.now();
          }
          initChat();
          ensureEditorLayout();
        } else {
          // Firebase auth unavailable - use guest mode
          setupGuestMode();
        }
      }
    }

    function setupGuestMode() {
      console.warn('Firebase auth is not available. Starting in guest mode.');
      document.getElementById('login-modal').classList.add('hidden');
      document.getElementById('app-container').style.display = 'flex';
      currentProjectId = currentProjectId || getProjectIdFromUrl() || loadLastProjectId() || 'project-' + Date.now();
      currentGuest = getGuestInfo();
      currentUser = null;
      userId = currentGuest.id;
      currentUserRole = 'Guest';
      renderUserProfile();
      initChat();
      ensureEditorLayout();
    }

    // This block will no longer execute early

    // Initialize editor
    function initialize() {
      try {
        restoreStoredUserSession();
        setupAuthStateListener();

        restoreProjectState();
        initializeTheme();
        setupUserActivityTracking();
        setupSidebarResizer();
        setupPreviewResizer();
        const sidebarToggleBtn = document.getElementById('sidebar-toggle-btn');
        if (sidebarToggleBtn) sidebarToggleBtn.addEventListener('click', toggleSidebarCollapse);
        currentProjectId = currentProjectId || getProjectIdFromUrl() || loadLastProjectId() || 'project-' + Date.now();

        const monacoContainer = document.getElementById('monaco-editor');
        if (!monacoContainer) return;

        const loader = window.require || window.requirejs;
        if (!loader) {
          console.warn('Monaco loader not available. Falling back to textarea.');
          monacoContainer.innerHTML = '<textarea id="fallback-editor" style="width:100%;height:100%;background:#1e1e1e;color:#d4d4d4;border:none;padding:16px;font-family: Consolas, monospace; font-size:14px; box-sizing:border-box;"></textarea>';
          const ta = document.getElementById('fallback-editor');
          if (ta) {
            ta.value = starterCodeMap['javascript'];
            setupFallbackEditor();
          }
          initializeProjectTabs();
          setupEventListeners();
          return;
        }

        loader.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs' }});
        loader(['vs/editor/editor.main'], function() {
          try {
            monacoContainer.style.width = '100%';
            monacoContainer.style.height = '100%';

            editorInstance = monaco.editor.create(monacoContainer, {
              value: starterCodeMap['javascript'],
              language: 'javascript',
              theme: 'vs-dark',
              automaticLayout: true,
              fontSize: 16,
              minimap: { enabled: false }
            });

            window.editor = editorInstance;
            fallbackEditor = null;

            editorInstance.onDidChangeModelContent((e) => {
              try {
                isSaved = false;
                scheduleSave();
                updatePreview();
                emitEditorChange(e.changes);
              } catch (error) {
                console.error('Error in editor change handler:', error);
              }
            });

            editorInstance.onDidChangeCursorPosition((e) => {
              try {
                emitCursorPosition();
              } catch (error) {
                console.error('Error in cursor position handler:', error);
              }
            });

            ensureEditorLayout();
          } catch (err) {
            console.error('ERROR creating editor:', err.message);
            monacoContainer.innerHTML = '<textarea id="fallback-editor" style="width:100%;height:100%;background:#1e1e1e;color:#d4d4d4;border:none;padding:16px;font-family: Consolas, monospace; font-size:14px; box-sizing:border-box;"></textarea>';
            const ta = document.getElementById('fallback-editor');
            if (ta) {
              ta.value = starterCodeMap['javascript'];
              setupFallbackEditor();
            }
          }

          initializeProjectTabs();
          setupEventListeners();
        }, function(err) {
          console.error('Monaco failed to load:', err);
          monacoContainer.innerHTML = '<textarea id="fallback-editor" style="width:100%;height:100%;background:#1e1e1e;color:#d4d4d4;border:none;padding:16px;font-family: Consolas, monospace; font-size:14px; box-sizing:border-box;"></textarea>';
          const ta = document.getElementById('fallback-editor');
          if (ta) {
            ta.value = starterCodeMap['javascript'];
            setupFallbackEditor();
          }

          initializeProjectTabs();
          setupEventListeners();
        });
      } catch (err) {
        console.error('Initialize error:', err);
      }
    }

    if (document.readyState === 'loading') {

    // Tab management
    let openTabs = [];
    let currentTabId = null;

    function createTabElement(tab) {
      const tabDiv = document.createElement('div');
      tabDiv.id = 'tab-' + tab.id;
      tabDiv.style.display = 'flex';
      tabDiv.style.alignItems = 'center';
      tabDiv.style.gap = '8px';
      tabDiv.style.padding = '6px 12px 3px';
      tabDiv.style.borderRight = '1px solid #3e3e42';
      tabDiv.style.borderBottom = currentTabId === tab.id ? '3px solid #0e639c' : '3px solid transparent';
      tabDiv.style.cursor = 'pointer';
      tabDiv.style.userSelect = 'none';
      tabDiv.style.whiteSpace = 'nowrap';
      
      const nameSpan = document.createElement('span');
      nameSpan.textContent = tab.name;
      nameSpan.style.fontSize = '13px';
      nameSpan.style.color = currentTabId === tab.id ? '#ffffff' : '#cccccc';
      
      const closeBtn = document.createElement('button');
      closeBtn.textContent = '✕';
      closeBtn.style.background = 'none';
      closeBtn.style.border = 'none';
      closeBtn.style.color = '#858585';
      closeBtn.style.cursor = 'pointer';
      closeBtn.style.fontSize = '14px';
      closeBtn.style.padding = '0 4px';
      
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        closeTab(tab.id);
      });
      
      tabDiv.appendChild(nameSpan);
      tabDiv.appendChild(closeBtn);
      
      tabDiv.addEventListener('click', () => switchTab(tab.id));
      tabDiv.addEventListener('mouseenter', () => {
        if (currentTabId !== tab.id) {
          tabDiv.style.background = 'rgba(255,255,255,0.02)';
        }
      });
      tabDiv.addEventListener('mouseleave', () => {
        if (currentTabId !== tab.id) {
          tabDiv.style.background = 'transparent';
        }
      });
      
      return tabDiv;
    }

    function renderTabs() {
      const tabBar = document.getElementById('tab-bar');
      if (!tabBar) return;
      tabBar.innerHTML = '';
      
      const openTabsList = openTabs.filter(tab => tab.isOpen !== false);
      openTabsList.forEach((tab) => {
        const tabEl = createTabElement(tab);
        tabBar.appendChild(tabEl);
      });
      updateSidebarFiles();
    }

    function saveCurrentTabContent() {
      if (!currentTabId) return;
      const currentTab = openTabs.find(t => t.id === currentTabId);
      if (!currentTab) return;
      currentTab.content = getEditorContent();
    }

    function switchTab(tabId) {
      const tab = openTabs.find(t => t.id === tabId);
      if (!tab) return;
      
      if (currentTabId && currentTabId !== tabId) {
        saveCurrentTabContent();
      }
      
      if (tab.isOpen === false) {
        tab.isOpen = true;
        renderTabs();
      }
      
      currentTabId = tabId;
      if (editorInstance) {
        const monacoLang = languageMap[tab.language] || 'plaintext';
        monaco.editor.setModelLanguage(editorInstance.getModel(), monacoLang);
        editorInstance.setValue(tab.content);
      } else {
        const textarea = document.getElementById('fallback-editor');
        if (textarea) {
          textarea.value = tab.content;
        }
      }
      
      renderTabs();
      document.getElementById('project-title').textContent = tab.name;
      showToast('Switched to: ' + tab.name);
      updatePreview();
    }

    function closeTab(tabId) {
      const tab = openTabs.find(t => t.id === tabId);
      if (!tab) return;
      
      tab.isOpen = false;
      
      if (currentTabId === tabId) {
        const openTabsList = openTabs.filter(t => t.isOpen !== false && t.id !== tabId);
        if (openTabsList.length > 0) {
          currentTabId = openTabsList[0].id;
          switchTab(currentTabId);
        } else {
          renderTabs();
        }
      } else {
        renderTabs();
      }
      
      showToast('Closed: ' + tabId);
    }

    function createNewFile(filename, language) {
      const extension = extensionMap[language] || 'txt';
      const finalName = filename.endsWith('.' + extension) ? filename : filename + '.' + extension;
      const timestamp = Date.now();
      const tabId = finalName + '-' + timestamp;
      
      const newTab = {
        id: tabId,
        name: finalName,
        language: language,
        content: starterCodeMap[language] || '// New file',
        isOpen: true
      };

      openTabs.push(newTab);
      renderTabs();
      switchTab(newTab.id);
      showToast('Created: ' + finalName);
    }

    function deleteFile(tabId) {
      const tab = openTabs.find(t => t.id === tabId);
      if (!tab) return;
      
      const fileName = tab.name;
      openTabs = openTabs.filter(t => t.id !== tabId);
      
      if (currentTabId === tabId) {
        const openTabsList = openTabs.filter(t => t.isOpen !== false);
        if (openTabsList.length > 0) {
          currentTabId = openTabsList[0].id;
          switchTab(currentTabId);
        } else if (openTabs.length > 0) {
          currentTabId = openTabs[0].id;
          switchTab(currentTabId);
        }
      }
      
      renderTabs();
      showToast('Deleted: ' + fileName);
    }

    function renameFile(tabId, newName) {
      const tab = openTabs.find(t => t.id === tabId);
      if (!tab) return;
      
      const oldName = tab.name;
      tab.name = newName;
      
      if (currentTabId === tabId) {
        document.getElementById('project-title').textContent = newName;
      }
      
      renderTabs();
      showToast('Renamed to: ' + newName);
    }

    function showNewFileModal() {
      const modal = document.getElementById('new-file-modal');
      if (modal) modal.classList.remove('hidden');
      const nameInput = document.getElementById('new-file-name');
      if (nameInput) {
        nameInput.focus();
        const timestamp = Date.now();
        nameInput.value = 'untitled-' + timestamp;
      }
    }

    function hideNewFileModal() {
      const modal = document.getElementById('new-file-modal');
      if (modal) modal.classList.add('hidden');
    }

    function updateSidebarFiles() {
      const fileList = document.getElementById('file-list');
      if (!fileList) return;
      
      const children = fileList.querySelectorAll(':scope > div');
      children.forEach(child => {
        if (child.id !== 'new-file-btn' && child.id !== 'new-project-btn') {
          child.remove();
        }
      });

      const groups = {};
      openTabs.forEach(tab => {
        const ext = (tab.name.split('.').pop() || 'other').toLowerCase();
        if (!groups[ext]) groups[ext] = [];
        groups[ext].push(tab);
      });

      const preferred = ['js','javascript','html','css','ts','typescript','py','python','java','cpp','other'];
      const keys = Object.keys(groups).sort((a,b) => {
        const ai = preferred.indexOf(a) === -1 ? preferred.length : preferred.indexOf(a);
        const bi = preferred.indexOf(b) === -1 ? preferred.length : preferred.indexOf(b);
        return ai - bi || a.localeCompare(b);
      });

      keys.forEach(k => {
        const groupName = k.toUpperCase();
        const folder = document.createElement('div');
        folder.style.marginBottom = '8px';

        const header = document.createElement('div');
        header.textContent = groupName;
        header.style.fontSize = '12px';
        header.style.color = '#9aa0c7';
        header.style.margin = '6px 0';
        folder.appendChild(header);

        const ul = document.createElement('div');
        ul.style.display = 'flex';
        ul.style.flexDirection = 'column';
        ul.style.gap = '4px';

        groups[k].forEach(tab => {
          const row = document.createElement('div');
          row.style.display = 'flex';
          row.style.alignItems = 'center';
          row.style.justifyContent = 'space-between';
          row.style.padding = '6px 8px';
          row.style.borderRadius = '4px';
          row.style.cursor = 'pointer';
          row.style.color = currentTabId === tab.id ? '#ffffff' : '#cccccc';
          row.style.background = currentTabId === tab.id ? '#0e639c' : 'transparent';
          row.style.fontSize = '13px';
          
          const nameSpan = document.createElement('span');
          nameSpan.textContent = tab.name;
          nameSpan.style.flex = '1';
          row.appendChild(nameSpan);
          
          const menuBtn = document.createElement('button');
          menuBtn.textContent = '⋯';
          menuBtn.style.background = 'none';
          menuBtn.style.border = 'none';
          menuBtn.style.color = currentTabId === tab.id ? '#ffffff' : '#cccccc';
          menuBtn.style.cursor = 'pointer';
          menuBtn.style.fontSize = '16px';
          menuBtn.style.padding = '0 4px';
          menuBtn.style.opacity = '0.6';
          menuBtn.style.transition = 'opacity 0.2s';
          
          menuBtn.addEventListener('mouseenter', () => menuBtn.style.opacity = '1');
          menuBtn.addEventListener('mouseleave', () => menuBtn.style.opacity = '0.6');
          
          const dropdown = document.createElement('div');
          dropdown.style.position = 'absolute';
          dropdown.style.background = '#3e3e42';
          dropdown.style.border = '1px solid #555';
          dropdown.style.borderRadius = '4px';
          dropdown.style.minWidth = '120px';
          dropdown.style.display = 'none';
          dropdown.style.zIndex = '1000';
          dropdown.style.boxShadow = '0 2px 8px rgba(0,0,0,0.3)';
          
          const renameBtn = document.createElement('div');
          renameBtn.textContent = '✏️ Rename';
          renameBtn.style.padding = '8px 12px';
          renameBtn.style.cursor = 'pointer';
          renameBtn.style.color = '#cccccc';
          renameBtn.style.fontSize = '12px';
          renameBtn.style.userSelect = 'none';
          renameBtn.addEventListener('mouseenter', () => renameBtn.style.background = '#555');
          renameBtn.addEventListener('mouseleave', () => renameBtn.style.background = 'transparent');
          renameBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const newName = prompt('Enter new filename:', tab.name);
            if (newName && newName.trim()) {
              renameFile(tab.id, newName.trim());
            }
            dropdown.style.display = 'none';
          });
          dropdown.appendChild(renameBtn);
          
          const separator = document.createElement('div');
          separator.style.height = '1px';
          separator.style.background = '#555';
          separator.style.margin = '4px 0';
          dropdown.appendChild(separator);
          
          const deleteBtn = document.createElement('div');
          deleteBtn.textContent = '🗑️ Delete';
          deleteBtn.style.padding = '8px 12px';
          deleteBtn.style.cursor = 'pointer';
          deleteBtn.style.color = '#ff6b6b';
          deleteBtn.style.fontSize = '12px';
          deleteBtn.style.userSelect = 'none';
          deleteBtn.addEventListener('mouseenter', () => deleteBtn.style.background = '#555');
          deleteBtn.addEventListener('mouseleave', () => deleteBtn.style.background = 'transparent');
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (confirm('Are you sure you want to delete ' + tab.name + '? This cannot be undone.')) {
              deleteFile(tab.id);
            }
            dropdown.style.display = 'none';
          });
          dropdown.appendChild(deleteBtn);
          
          menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.style.display = dropdown.style.display === 'none' ? 'block' : 'none';
            const rect = menuBtn.getBoundingClientRect();
            dropdown.style.top = (rect.bottom + 5) + 'px';
            dropdown.style.left = (rect.left - 100) + 'px';
          });
          
          row.appendChild(menuBtn);
          row.appendChild(dropdown);
          
          row.addEventListener('click', () => {
            switchTab(tab.id);
          });
          
          ul.appendChild(row);
        });

        folder.appendChild(ul);
        fileList.appendChild(folder);
      });
    }

    function saveProject() {
      saveCurrentTabContent();
      saveProjectStateToLocal();

      const code = getEditorContent();
      if (!code) {
        showToast('Nothing to save yet.');
        return;
      }

      if (!userId || !currentProjectId) {
        showToast('Saved locally. Sign in to sync to cloud.');
        return;
      }

      if (!db || typeof db.ref !== 'function') {
        showToast('Saved locally. Cloud save unavailable.');
        return;
      }

      db.ref('projects/' + userId + '/' + currentProjectId + '/code').set(code).then(() => {
        isSaved = true;
        showToast('Saved!');
      }).catch(err => {
        console.error('Save error:', err);
        showToast('Saved locally, cloud save failed');
      });

    function formatActiveTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;
      if (hours) return `${hours}h ${minutes}m`;
      if (minutes) return `${minutes}m ${secs}s`;
      return `${secs}s`;
    }

    function getComputedActiveSeconds(user) {
      if (!user) return 0;
      return Math.max(0, user.activeSeconds || 0);
    }

      renderDashboardMetrics();
