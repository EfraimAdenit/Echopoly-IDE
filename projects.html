<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EchoPoly Projects</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #1a1f35 100%);
      position: relative;
      overflow-x: hidden;
      color: #e3eaf2;
    }

    /* Animated background */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(-45deg, #122548, #1b3665, #0f172a, #17202e);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      z-index: 0;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glow-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.08;
      z-index: 0;
    }

    .glow-blob-1 {
      width: 300px;
      height: 300px;
      background: #7c3aed;
      top: -100px;
      right: -50px;
      animation: float 20s ease-in-out infinite;
    }

    .glow-blob-2 {
      width: 200px;
      height: 200px;
      background: #3b82f6;
      bottom: -50px;
      left: -50px;
      animation: float 15s ease-in-out infinite reverse;
    }

    .glow-blob-3 {
      width: 250px;
      height: 250px;
      background: #06b6d4;
      top: 50%;
      left: 10%;
      animation: float 25s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(30px); }
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      z-index: 1000;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #94a3b8;
      font-size: 14px;
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      color: white;
    }

    .logout-btn {
      padding: 6px 12px;
      background: rgba(239, 68, 68, 0.1);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    .add-card-btn {
      padding: 8px 16px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .add-card-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
    }

    .settings-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 18px;
      cursor: pointer;
      padding: 8px;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .settings-btn:hover {
      color: #7c3aed;
      background: rgba(124, 58, 237, 0.1);
    }
        color: var(--primary);

      .settings-content label {

      }
      .settings-content select, .settings-content button {
        padding: 0.5em 1em;

    /* Project Dashboard */
    .project-dashboard {
      padding: 120px 2rem 40px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    .project-dashboard h2 {
      margin-bottom: 2rem;
      font-size: 1.8rem;
      color: #f1f5f9;
      font-weight: 600;
      text-align: center;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    .project-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 16px;
      padding: 1.5rem;
      position: relative;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: all 0.3s ease;
      height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .project-card:hover {
      transform: translateY(-4px);
      border-color: rgba(59, 130, 246, 0.3);
      box-shadow: 0 20px 40px rgba(59, 130, 246, 0.15);
    }

    .project-thumb {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 1rem;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .project-thumb.no-image-thumb {
      background: rgba(30, 41, 59, 0.8);
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      border-radius: 12px;
      height: 120px;
      font-size: 2rem;
    }

    .card-info h3 {
      margin: 0 0 0.5rem 0;
      font-size: 1.1rem;
      color: #f1f5f9;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .card-info p {
      margin: 0.2rem 0;
      font-size: 0.9rem;
      color: #94a3b8;
      font-weight: 400;
    }

    .card-info p:last-child {
      color: #7c3aed;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .card-menu {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
    }

    .menu-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      color: #94a3b8;
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .menu-btn:hover {
      background: rgba(124, 58, 237, 0.1);
      color: #7c3aed;
    }

    .menu-dropdown {
      display: none;
      position: absolute;
      right: 0;
      top: 32px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      padding: 0.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      z-index: 10;
      min-width: 140px;
    }

    .menu-dropdown button {
      display: block;
      width: 100%;
      background: none;
      border: none;
      color: #94a3b8;
      padding: 0.6rem 1rem;
      text-align: left;
      font-size: 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .menu-dropdown button:hover {
      background: rgba(124, 58, 237, 0.1);
      color: #7c3aed;
    }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 2000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
    }

    .modal-content {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      margin: 7% auto;
      padding: 2.5rem 2rem 2rem;
      border-radius: 16px;
      width: 360px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .modal-content h2 {
      color: #f1f5f9;
      margin-bottom: 1.5rem;
      font-size: 1.4rem;
      font-weight: 600;
    }

    .modal-content input,
    .modal-content select {
      width: 92%;
      margin: 0.7rem 0;
      padding: 0.8rem;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(30, 41, 59, 0.5);
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .modal-content input:focus,
    .modal-content select:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .modal-content button {
      margin-top: 1.5rem;
      padding: 0.8rem 1.5rem;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .modal-content button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
    }

    .close-btn {
      position: absolute;
      top: 1rem;
      right: 1.2rem;
      font-size: 1.5rem;
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .close-btn:hover {
      color: #f1f5f9;
      background: rgba(239, 68, 68, 0.1);
    }

    /* Settings Modal */
    .settings-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .settings-modal.active {
      display: flex;
    }

    .settings-content {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 2em 2.5em;
      border-radius: 16px;
      min-width: 320px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      position: relative;
    }

    .settings-content h2 {
      margin-top: 0;
      color: #f1f5f9;
      font-size: 1.4rem;
      font-weight: 600;
    }

    .settings-content label {
      display: block;
      margin: 1.5em 0 0.5em 0;
      font-weight: 500;
      color: #94a3b8;
    }

    .settings-content select {
      width: 100%;
      padding: 0.8rem;
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(30, 41, 59, 0.5);
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .settings-content select:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .settings-content button {
      margin-top: 1.5rem;
      padding: 0.8rem 1.5rem;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .settings-content button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(124, 58, 237, 0.3);
    }

    .settings-close {
      position: absolute;
      top: 1em;
      right: 1.2em;
      font-size: 1.5em;
      color: #94a3b8;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.3rem;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .settings-close:hover {
      color: #f1f5f9;
      background: rgba(239, 68, 68, 0.1);
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      header {
        padding: 1rem;
      }

      .logo {
        font-size: 20px;
      }

      .header-actions {
        gap: 0.5rem;
      }

      .add-card-btn {
        padding: 6px 12px;
        font-size: 12px;
      }

      .project-dashboard {
        padding: 100px 1rem 40px;
      }

      .project-dashboard h2 {
        font-size: 1.5rem;
      }

      .card-grid {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .modal-content {
        margin: 20px;
        width: calc(100% - 40px);
        padding: 2rem 1.5rem;
      }

      .settings-content {
        padding: 1.5rem 2rem;
        min-width: 280px;
      }
    }

.polygon-bg {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none; /* allow clicks to pass through to buttons and content */
  z-index: 0;
  overflow: hidden;
}
.poly {
  position: absolute;
  opacity: 0.85;
  filter: drop-shadow(0 0 18px #7c3aed55) blur(0.5px);
  transition: opacity 0.5s;
  pointer-events: none;
}
.glow1 {
  fill: rgba(124,58,237,0.10);
  stroke: #7c3aed;
  stroke-width: 3;
  filter: drop-shadow(0 0 16px #7c3aed88);
}
.glow2 {
  fill: rgba(79,70,229,0.09);
  stroke: #4f46e5;
  stroke-width: 2.5;
  filter: drop-shadow(0 0 12px #4f46e588);
}
.glow3 {
  fill: rgba(189,189,252,0.08);
  stroke: #bdbdfc;
  stroke-width: 2;
  filter: drop-shadow(0 0 10px #bdbdfc88);
}
.glow4 {
  fill: rgba(124,58,237,0.07);
  stroke: #7c3aed;
  stroke-width: 2.5;
  filter: drop-shadow(0 0 14px #7c3aed66);
}
.draggable-poly {
  cursor: default;
  pointer-events: none;
  transition: box-shadow 0.2s;
}
.draggable-poly:active {
  cursor: default;
}

.pulse-glow {
  animation: pulse-glow 2.2s infinite cubic-bezier(0.4,0,0.2,1);
}

@keyframes pulse-glow {
  0% {
    filter: drop-shadow(0 0 8px #fffeff88) drop-shadow(0 0 16px #7c3aed44);
    stroke-width: 3;
  }
  50% {
    filter: drop-shadow(0 0 24px #7c3aedff) drop-shadow(0 0 40px #7c3aed88);
    stroke-width: 4.5;
  }
  100% {
    filter: drop-shadow(0 0 8px #7c3aed88) drop-shadow(0 0 16px #7c3aed44);
    stroke-width: 3;
  }
}

  <script>

    function applyTheme(mode) {
      document.body.classList.remove('light-mode', 'dark-mode');
      if (mode === 'dark') {
        document.body.classList.add('dark-mode');
      } else if (mode === 'light') {
        document.body.classList.add('light-mode');
      } else {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.body.classList.add(prefersDark ? 'dark-mode' : 'light-mode');
      }
    }

    function loadThemeSetting() {
      const mode = localStorage.getItem('theme-mode') || 'system';
      const el = document.getElementById('theme-select');
      if (el) el.value = mode;
      applyTheme(mode);
    }

    function saveThemeSetting() {
      const mode = document.getElementById('theme-select').value;
      localStorage.setItem('theme-mode', mode);
      applyTheme(mode);
    }

    function openModal() {
      const modal = document.getElementById('project-modal');
      if (modal) modal.style.display = 'block';
    }

    function closeModal() {
      const modal = document.getElementById('project-modal');
      if (modal) modal.style.display = 'none';
    }

    function openProject(projectId) {
      const encoded = encodeURIComponent(projectId);
      window.location.href = 'editor.html?project=' + encoded + '&collab=true';
    }

    function toggleMenu(id) {
      const menu = document.getElementById('menu-' + id);
      if (!menu) return;
      menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    function renderCards(querySnapshot) {
      const container = document.getElementById('project-cards');
      if (!container) return;
      container.innerHTML = '';

      if (querySnapshot.empty) return;

      querySnapshot.forEach(doc => {
        const id = doc.id;
        const project = doc.data();

        const card = document.createElement('div');
        card.className = 'project-card';

        const hasImage = project.screenshot && typeof project.screenshot === 'string' && project.screenshot.startsWith('http');
        const imageSection = hasImage
          ? `<img src="${project.screenshot}" alt="${project.name || 'Project'}" class="project-thumb" onerror="this.style.display='none';" />`
          : `<div class="project-thumb no-image-thumb"><span>💻</span></div>`;

        const maxUsers = project.maxUsers || 10;
        const isOwner = project.createdBy === (auth.currentUser && auth.currentUser.uid);
        const roleLabel = isOwner ? 'Owner' : 'Collaborator';

        card.innerHTML = `
          ${imageSection}
          <div class="card-info">
            <h3>${escapeHtml(project.name || 'Untitled Project')}</h3>
            <p>${roleLabel} &bull; Max ${maxUsers} users</p>
            <p>${project.status === 'active' ? '🟢 Active' : '⚪ Inactive'}</p>
            <span class="card-member-count">👥 ${maxUsers}</span>
          </div>
          <div class="card-menu">
            <button class="menu-btn" onclick="event.stopPropagation();toggleMenu('${id}')">⋯</button>
            <div id="menu-${id}" class="menu-dropdown">
              <button onclick="openProject('${id}')">Open</button>
              <button onclick="renameProject('${id}')">Rename</button>
              <button onclick="copyProjectLink('${id}', '${project.inviteToken || ''}')">Copy Invite Link</button>
              <button onclick="deleteProject('${id}')">Delete</button>
            </div>
          </div>
        `;

        card.addEventListener('click', (e) => {
          if (e.target.closest('.card-menu')) return;
          openProject(id);
        });

        container.appendChild(card);
      });
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function copyProjectLink(projectId, inviteToken) {
      const url = window.location.origin + '/editor.html?project=' + encodeURIComponent(projectId) + (inviteToken ? '&invite=' + inviteToken : '&collab=true');
      navigator.clipboard.writeText(url).then(() => alert('Invite link copied!')).catch(() => prompt('Copy this link:', url));
    }

    async function submitNewProject() {
      const nameInput = document.getElementById('project-name');
      const maxUsersSelect = document.getElementById('project-max-users');
      const name = (nameInput?.value || '').trim();
      const maxUsers = parseInt(maxUsersSelect?.value || '10');

      if (!name) {
        alert('Please enter a project name.');
        return;
      }

      const user = auth && auth.currentUser;
      if (!user) {
        alert('You must be logged in to create a project.');
        return;
      }

      const btn = document.getElementById('create-project-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Creating…'; }

      try {
        // Collect invited emails FIRST before any Firestore writes
        const emailInputs = document.querySelectorAll('.invite-email-input');
        const invitedEmails = [];
        emailInputs.forEach(input => {
          const email = (input.value || '').trim().toLowerCase();
          if (email && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) && email !== (user.email || '').toLowerCase()) {
            if (!invitedEmails.includes(email)) invitedEmails.push(email);
          }
        });

        const projectId = 'proj-' + Date.now() + '-' + Math.random().toString(36).substr(2, 6);
        const inviteToken = Math.random().toString(36).substr(2, 12) + Math.random().toString(36).substr(2, 12);

        // Build the full memberEmails array upfront (owner + all invitees)
        const allMemberEmails = [user.email || '', ...invitedEmails].filter(Boolean);

        const projectRef = fsdb.collection('projects').doc(projectId);
        await projectRef.set({
          id: projectId,
          name,
          maxUsers,
          inviteToken,
          status: 'active',
          createdBy: user.uid,
          createdByEmail: user.email || '',
          memberEmails: allMemberEmails,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Add creator as owner member doc
        await projectRef.collection('members').doc(user.uid).set({
          email: user.email || '',
          uid: user.uid,
          role: 'owner',
          status: 'active',
          joinedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        // Write each invited member doc sequentially using stable email-based IDs
        for (const email of invitedEmails) {
          const safeDocId = email.replace(/[.]/g, ',');  // Firestore doc IDs can't contain '.'
          await projectRef.collection('members').doc(safeDocId).set({
            email,
            uid: null,
            role: 'editor',
            status: 'invited',
            invitedAt: firebase.firestore.FieldValue.serverTimestamp(),
            invitedBy: user.uid
          });
        }

        // Mirror a lightweight entry in RTDB so editor.html can load metadata fast
        await db.ref('projects/' + projectId).set({
          code: '',
          status: 'active',
          createdAt: Date.now(),
          createdBy: user.email || user.uid
        });

        // Reset form
        if (nameInput) nameInput.value = '';
        if (maxUsersSelect) maxUsersSelect.selectedIndex = 1;
        resetEmailRows();
        closeModal();

        // Show invite dialog or navigate directly
        const shareUrl = window.location.origin + '/editor.html?project=' + encodeURIComponent(projectId) + '&invite=' + inviteToken;
        _pendingOpenProjectId = projectId;
        showInviteDialog(shareUrl, invitedEmails, projectId);
      } catch (err) {
        console.error('Failed to create project:', err);
        alert('Failed to create project: ' + (err.message || err));
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Create Project'; }
      }
    }

    function addEmailRow() {
      const list = document.getElementById('invite-email-list');
      const row = document.createElement('div');
      row.className = 'invite-email-row';
      row.innerHTML = `
        <input type="email" class="invite-email-input" placeholder="colleague@example.com" />
        <button type="button" class="remove-email-btn" onclick="removeEmailRow(this)" title="Remove">&times;</button>
      `;
      list.appendChild(row);
      row.querySelector('input').focus();
    }

    function removeEmailRow(btn) {
      const row = btn.closest('.invite-email-row');
      const list = document.getElementById('invite-email-list');
      if (list && list.children.length > 1) {
        row.remove();
      } else {
        const input = row.querySelector('input');
        if (input) input.value = '';
      }
    }

    function resetEmailRows() {
      const list = document.getElementById('invite-email-list');
      if (!list) return;
      list.innerHTML = `
        <div class="invite-email-row">
          <input type="email" class="invite-email-input" placeholder="colleague@example.com" />
          <button type="button" class="remove-email-btn" onclick="removeEmailRow(this)" title="Remove">&times;</button>
        </div>
      `;
    }

    function showInviteDialog(shareUrl, invitedEmails, projectId) {
      const dialog = document.getElementById('invite-success-dialog');
      const urlSpan = document.getElementById('invite-share-url');
      const emailsDiv = document.getElementById('invited-emails-display');
      const openBtn = document.getElementById('invite-open-btn');

      if (urlSpan) urlSpan.textContent = shareUrl;
      if (emailsDiv) {
        emailsDiv.textContent = invitedEmails.length > 0
          ? 'Invited: ' + invitedEmails.join(', ')
          : 'No collaborators invited. You can share the link above anytime.';
      }
      if (openBtn) {
        openBtn.onclick = () => openProject(projectId);
      }
      if (dialog) dialog.classList.add('active');
    }

    function copyInviteUrl() {
      const urlSpan = document.getElementById('invite-share-url');
      if (!urlSpan) return;
      navigator.clipboard.writeText(urlSpan.textContent).then(() => {
        const btn = urlSpan.nextElementSibling;
        if (btn) { btn.textContent = 'Copied!'; setTimeout(() => { btn.textContent = 'Copy'; }, 2000); }
      });
    }

    function renameProject(id) {
      const newName = prompt('New project name:');
      if (newName && newName.trim()) {
        fsdb.collection('projects').doc(id).update({ name: newName.trim() })
          .catch(err => alert('Rename failed: ' + err.message));
      }
    }

    function deleteProject(id) {
      if (confirm('Delete this project? This cannot be undone.')) {
        fsdb.collection('projects').doc(id).delete()
          .catch(err => alert('Delete failed: ' + err.message));
      }
    }

    let selectedLanguageProjectId = null;

    function openLanguageModal(projectId) {
      selectedLanguageProjectId = projectId;
      const lm = document.getElementById('language-modal');
      if (lm) lm.classList.remove('hidden');
    }

    function setupProjectsListener(user) {
      if (firestoreUnsub) { firestoreUnsub(); firestoreUnsub = null; }
      if (!user || !user.uid) {
        const container = document.getElementById('project-cards');
        if (container) container.innerHTML = '';
        return;
      }
      firestoreUnsub = fsdb.collection('projects')
        .where('createdBy', '==', user.uid)
        .orderBy('createdAt', 'desc')
        .onSnapshot(
          snap => renderCards(snap),
          err => {
            console.error('Projects listener error:', err);
            // Fallback without orderBy if composite index not yet created
            if (err.code === 'failed-precondition' || String(err).includes('index')) {
              firestoreUnsub = fsdb.collection('projects')
                .where('createdBy', '==', user.uid)
                .onSnapshot(snap => renderCards(snap), e2 => console.error('Projects fallback error:', e2));
            }
          }
        );
    }

    document.addEventListener('DOMContentLoaded', () => {
      const settingsBtn = document.getElementById('settings-btn');
      const settingsModal = document.getElementById('settings-modal');
      const settingsClose = document.getElementById('settings-close');
      const saveSettingsBtn = document.getElementById('save-settings');
      const createBtn = document.getElementById('create-project-btn');
      const cancelLang = document.getElementById('cancel-language');
      const confirmLang = document.getElementById('confirm-language');
      const finalConfirm = document.getElementById('final-confirm');
      const finalCancel = document.getElementById('final-cancel');

      if (settingsBtn && settingsModal) {
        settingsBtn.addEventListener('click', () => settingsModal.classList.add('active'));
      }
      if (settingsClose && settingsModal) {
        settingsClose.addEventListener('click', () => settingsModal.classList.remove('active'));
      }
      if (saveSettingsBtn && settingsModal) {
        saveSettingsBtn.addEventListener('click', () => {
          saveThemeSetting();
          settingsModal.classList.remove('active');
        });
      }
      if (createBtn) {
        createBtn.addEventListener('click', submitNewProject);
      }

      // Close invite dialog on backdrop click
      const inviteDialog = document.getElementById('invite-success-dialog');
      if (inviteDialog) {
        inviteDialog.addEventListener('click', (e) => {
          if (e.target === inviteDialog) inviteDialog.classList.remove('active');
        });
      }
      if (cancelLang) {
        cancelLang.addEventListener('click', () => {
          const lm = document.getElementById('language-modal');
          if (lm) lm.classList.add('hidden');
        });
      }
      if (confirmLang) {
        confirmLang.addEventListener('click', () => {
          const warningModal = document.getElementById('warning-modal');
          if (warningModal) warningModal.classList.remove('hidden');
        });
      }
      if (finalCancel) {
        finalCancel.addEventListener('click', () => {
          const warningModal = document.getElementById('warning-modal');
          if (warningModal) warningModal.classList.add('hidden');
        });
      }
      if (finalConfirm) {
        finalConfirm.addEventListener('click', () => {
          const selector = document.getElementById('language-selector');
          const newLang = selector ? selector.value : null;
          const warningModal = document.getElementById('warning-modal');
          if (!selectedLanguageProjectId) {
            alert('No project selected.');
            if (warningModal) warningModal.classList.add('hidden');
            return;
          }
          if (!newLang) {
            alert('Please select a language.');
            return;
          }
          db.ref('projects/' + selectedLanguageProjectId + '/language').set(newLang)
            .then(() => {
              alert('Project language changed to ' + newLang);
              if (warningModal) warningModal.classList.add('hidden');
            })
            .catch((err) => {
              console.error('Failed to update language:', err);
              alert('Failed to update language: ' + (err.message || err));
              if (warningModal) warningModal.classList.add('hidden');
            });
        });
      }
      loadThemeSetting();
      if (window.matchMedia) {
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
          if ((localStorage.getItem('theme-mode') || 'system') === 'system') {
            applyTheme('system');
          }
        });
      }
    });

    auth.onAuthStateChanged(user => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      // Write global presence so Firebase shows this user as online
      const presenceRef = db.ref('presence/' + user.uid);
      presenceRef.set({
        email: user.email || '',
        displayName: user.displayName || user.email || '',
        status: 'online',
        online: true,
        lastActive: Date.now()
      }).catch(() => {});
      presenceRef.onDisconnect().set({
        email: user.email || '',
        displayName: user.displayName || user.email || '',
        status: 'offline',
        online: false,
        lastActive: Date.now()
      }).catch(() => {});

      setupProjectsListener(user);
      updateProjectUserProfile();
    });

    function getUserDisplayName(user) {
      if (!user) return 'User';
      return user.displayName || (user.email ? user.email.split('@')[0] : 'User');
    }

    function updateProjectUserProfile() {
      const userData = JSON.parse(localStorage.getItem('currentUser') || '{}');
      const user = (auth && auth.currentUser) ? auth.currentUser : (userData && Object.keys(userData).length ? userData : null);
      const userName = user ? getUserDisplayName(user) : 'Guest';
      const avatarElement = document.getElementById('user-avatar');
      const nameElement = document.getElementById('user-name');
      if (avatarElement) avatarElement.textContent = userName.charAt(0).toUpperCase();
      if (nameElement) nameElement.textContent = userName;
    }

    async function logout() {
      window._navigatingWithinApp = false; // don't cancel onDisconnect — let it fire
      localStorage.removeItem('currentUser');
      const user = auth && auth.currentUser;
      if (user && db) {
        try { await db.ref('presence/' + user.uid).remove(); } catch (_) {}
      }
      if (auth && typeof auth.signOut === 'function') {
        await auth.signOut().catch(() => {});
      }
      window.location.href = 'index.html';
    }

  </script>
</body>
</html>
